AWSTemplateFormatVersion: "2010-09-09"
Description: CloudFormation stack for https://runs-on.com
Transform: AWS::LanguageExtensions

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Main configuration [required]"
        Parameters:
          - GithubOrganization
          - LicenseKey
          - EmailAddress
          - Environment
      - Label:
          default: "Networking and security [optional]"
        Parameters:
          - Private
          - Ipv6Enabled
          - SSHAllowed
          - SSHCidrRange
          - EnableWAF
          - EnableAdminRoutes
          - EncryptEbs
          - RunnerCustomPolicy
          - AppCustomPolicy
      - Label:
          default: "Runner behavior and storage [optional]"
        Parameters:
          - EnableBedrock
          - EnableEfs
          - EnableEphemeralRegistry
          - RunnerCustomTags
          - RunnerMaxRuntime
          - RunnerConfigAutoExtendsFrom
          - S3CacheExpirationInDays
      - Label:
          default: "App runtime and maintenance [optional]"
        Parameters:
          - AppSize
          - AppGithubApiStrategy
          - AppRegistry
          - LoggerLevel
          - SpotCircuitBreaker
          - MaintenanceMode
      - Label:
          default: "Observability, cost, and integrations [optional]"
        Parameters:
          - OtelExporterEndpoint
          - OtelExporterHeaders
          - OtelExporterTemporality
          - CostReportsEnabled
          - AlertTopicSlackWebhookUrl
          - AppBudgetDailyUsd
          - CostAllocationTag
          - IntegrationStepSecurityApiKey
Parameters:
  # Main configuration [required]
  GithubOrganization:
    Type: String
    Description: "If your GitHub organization lives at github.com/my-org, then enter: my-org. IMPORTANT: this field is case-sensitive."
    MinLength: 1

  LicenseKey:
    Type: String
    Description: |
      License key for RunsOn, either as a string or SSM parameter ARN (with the format `arn:aws:ssm:REGION:ACCOUNT:parameter/STACK_NAME/license-key`). Get one at https://runs-on.com/pricing.
    NoEcho: true
    MinLength: 1

  EmailAddress:
    Type: String
    Description: Email address for cost and alert reports. You will receive a confirmation email from AWS at this address during the installation (check your spam folder if needed) so make sure to use a valid address. You must confirm it if you want to receive cost and alert reports.
    MinLength: 1

  Environment:
    Type: String
    Default: "production"
    MinLength: 1
    Description: "Make RunsOn only listen to jobs with an `env` job label matching this value. Only change this if you know what you are doing. See https://runs-on.com/configuration/environments/ for more details."

  # Networking and security [optional]
  Private:
    Type: String
    Default: "false"
    AllowedValues:
      - "only"
      - "always"
      - "true"
      - "false"
    Description: "Enable ('true', 'always', 'only') or disable ('false') private networking. If 'true', your jobs can opt-in to launch in private subnets with the `private=true` label, and they will get a static egress IP. If 'always', all jobs will run in private subnets, and they will all get a static egress IP, unless you manually opt-out in your job definition with the `private=false` label. If 'only', then jobs can only launch in private subnets. Note that enabling it will create 1 managed NAT gateway, with the corresponding costs. More details at https://runs-on.com/networking/static-ips/."

  Ipv6Enabled:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable or disable IPv6 for runners. Disabling ipv6 might help with Docker Hub rate limiting issues.

  SSHAllowed:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: Allow inbound SSH connections from the specified CIDR range to the runners.

  SSHCidrRange:
    Type: String
    Default: 0.0.0.0/0
    Description: CIDR range for inbound SSH access. By default, only repository collaborators with admin permission will be able to SSH into the runner instances.
    MinLength: 1

  EnableWAF:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Enable AWS WAF for the public ingress."

  EnableAdminRoutes:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: "Enable the admin Lambda routes (`/`, `/setup`, `/setup/{proxy+}`, `/readyz`) on the public ingress."

  EncryptEbs:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Encrypt the EBS volumes of the runner instances. Encryption will slow the boot time of runner instances by ~10s."

  RunnerCustomPolicy:
    Type: String
    Default: ""
    Description: "Optional managed IAM Policy ARN to assign to the EC2 runner instances. Can be used to give runners access to AWS resources that you manage."

  AppCustomPolicy:
    Type: String
    Default: ""
    Description: "Optional managed IAM Policy ARN to assign to the App runner service role. Can be used to e.g. allow access to KMS decryption keys for AMIs."

  # Runner behavior and storage [optional]
  EnableBedrock:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Enable Amazon Bedrock access for EC2 runner instances. When enabled, runners can use their instance profile credentials with Bedrock-compatible AI agents such as Claude Code or OpenCode."

  EnableEfs:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Enable EFS shared filesystem for runners. If enabled, an EFS volume will be created and made available to runners. Runners will need appropriate permissions and tools (e.g., nfs-utils) to mount it."

  EnableEphemeralRegistry:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "If enabled, create an ECR ephemeral registry that can be used as a type=registry cache backend for Docker BuildKit. The registry will be created with a 10-day lifecycle policy, and runners will automatically be granted push/pull access."

  RunnerCustomTags:
    Type: CommaDelimitedList
    Default: ""
    Description: "Optional custom tags for the runner instances (e.g. 'key1=value1,key2=value2'). Tag keys cannot start with `runs-on`, and can only use letters (a-z, A-Z), numbers (0-9), and the following characters: + - = . , _ : @ (https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/Using_Tags.html#tag-restrictions)"

  RunnerMaxRuntime:
    Type: Number
    Default: 720
    MinValue: 30
    Description: Maximum runtime in minutes for runners. After this time, the runner will be forcefully terminated.

  RunnerConfigAutoExtendsFrom:
    Type: String
    Default: ".github-private"
    MinLength: 1
    Description: "When set to a repository name (e.g., '.github-private'), forces all repository configurations to extend from that repository. The config will be read from `<repo-name>/.github/runs-on.yml`. This allows you to provide a base configuration that applies to all repositories, even if they don't have a local runs-on.yml file. Set to '.' to disable auto-extend and use each repository's local extends (if any). Make sure the GitHub App has access to the specified repository."

  S3CacheExpirationInDays:
    Type: Number
    Default: 10
    Description: "Number of days to keep cache entries in the S3 cache bucket."

  # App runtime and maintenance [optional]
  AppSize:
    Type: String
    Default: "small"
    AllowedValues:
      - "small"
      - "medium"
      - "high"
      - "xhigh"
    Description: "Preset for the RunsOn control plane. This sets the worker service CPU/memory, queued-job concurrency, and the default EC2 launch/termination rate-limit assumptions together. Higher concurrency presets assume you have raised the relevant EC2 quotas (https://docs.aws.amazon.com/AWSEC2/latest/APIReference/throttling.html)."

  AppGithubApiStrategy:
    Type: String
    Default: "normal"
    AllowedValues:
      - "normal"
      - "conservative"
    Description: "Use normal or conservative GitHub API strategy. The conservative strategy will attempt to save GitHub API tokens by not automatically de-registering runners from the GitHub API after they are no longer needed. It's more elegant to clean them up (recommended), but in any case GitHub will eventually clean them up on their side after 24h. Especially useful if you launch tens of thousands of jobs every day."

  AppRegistry:
    Type: String
    Default: "public.ecr.aws/c5h5o9k1/runs-on/runs-on"
    Description: "Docker image (public) registry for the RunsOn service."

  LoggerLevel:
    Type: String
    Default: "info"
    AllowedValues:
      - "trace"
      - "debug"
      - "info"
      - "warn"
    Description: "Log level for the RunsOn server. Options: trace (most verbose), debug, info (default), warn (least verbose)."

  SpotCircuitBreaker:
    Type: String
    Default: "2/15/30"
    AllowedPattern: "^(false|[0-9]+/[0-9]+/[0-9]+)$"
    Description: "Enable (`COUNT/WINDOW_MINUTES/RECOVERY_MINUTES`) or disable (`false`) the spot instance circuit breaker. If enabled, the circuit breaker will prevent the stack from launching new spot instances during RECOVERY_MINUTES if there was at least COUNT spot interruptions during the last WINDOW_MINUTES. For instance 2/15/30 will prevent the stack from launching new spot instances during 30 minutes if there was at least 2 spot interruptions during the last 15 minutes."

  MaintenanceMode:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Enable maintenance mode (scales the worker service to zero)"

  # Observability, cost, and integrations [optional]
  OtelExporterEndpoint:
    Type: String
    Default: ""
    Description: "OTLP endpoint URL (e.g., ingest.eu.signoz.cloud:443, or https://otlp-gateway-prod-eu-west-0.grafana.net/otlp). Only HTTP(s) protocol is supported. Leave empty for no metrics export."

  OtelExporterHeaders:
    Type: String
    Default: ""
    NoEcho: true
    Description: "Headers for OTLP endpoint in W3C Baggage format: 'key1=value1,key2=value2' (e.g., 'signoz-ingestion-key=ABCD1234'). Leave empty if not required."

  OtelExporterTemporality:
    Type: String
    Default: "cumulative"
    AllowedValues:
      - "cumulative"
      - "delta"
    Description: "OTLP metrics temporality. Use cumulative (default) or delta (required by Datadog)."

  CostReportsEnabled:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable or disable cost reports sent by email.

  AlertTopicSlackWebhookUrl:
    Type: String
    Description: Slack incoming webhook URL for alert notifications.
    Default: ""
    NoEcho: true

  AppBudgetDailyUsd:
    Type: Number
    Default: "10"
    Description: "Create a daily AWS cost budget in USD for this stack, filtered by the configured cost allocation tag. The budget evaluates UTC billing periods rather than real-time operational usage. For AWS Organizations member accounts, activate the cost allocation tag in the management account's Billing settings."

  CostAllocationTag:
    Type: String
    Default: "stack"
    Description: "Cost allocation tag key to use for all the deployed resources. The value for this tag will be set to the stack name. Updating this after creation will require deleting the stack and recreating it."

  IntegrationStepSecurityApiKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: "API key for Step Security (see https://stepsecurity.io/ for more details)."

Mappings:
  App:
    Tags:
      BootstrapTag: v0.1.12
      AppTag: v3.0.1-rc.1
      ImageTag: v3.0.1-rc.1@sha256:684bf7783a59bdc58b5e5a795c86e7954614db285aa6b89defe618bb41266fec
  AppSize:
    small:
      Cpu: 256
      Memory: 512
    medium:
      Cpu: 256
      Memory: 512
    high:
      Cpu: 512
      Memory: 1024
    xhigh:
      Cpu: 512
      Memory: 1024

Conditions:
  CostReportsEnabled: !Equals [!Ref CostReportsEnabled, "true"]
  AlertTopicSlackWebhookProvided: !Not [!Equals [!Ref AlertTopicSlackWebhookUrl, ""]]
  PrivateEnabled: !Not [!Equals [!Ref Private, "false"]]
  HasPrivateSubnet: !Condition PrivateEnabled
  HasEncryptEbs: !Equals [!Ref EncryptEbs, "true"]
  IsPrivateOnly: !Equals [!Ref Private, "only"]
  RunnerCustomPolicyProvided: !Not [!Equals [!Ref RunnerCustomPolicy, ""]]
  AppCustomPolicyProvided: !Not [!Equals [!Ref AppCustomPolicy, ""]]
  MaintenanceModeEnabled: !Equals [!Ref MaintenanceMode, "true"]
  WafEnabled: !Equals [!Ref EnableWAF, "true"]
  AdminRoutesEnabled: !Equals [!Ref EnableAdminRoutes, "true"]
  AdminRoutesDisabled: !Equals [!Ref EnableAdminRoutes, "false"]
  HasIpv6Enabled: !Equals [!Ref Ipv6Enabled, "true"]
  HasSSHAllowed: !Equals [!Ref SSHAllowed, "true"]
  BedrockEnabled: !Equals [!Ref EnableBedrock, "true"]
  CreateEfs: !Equals [!Ref EnableEfs, "true"]
  CreateEphemeralRegistry: !Equals [!Ref EnableEphemeralRegistry, "true"]
Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.1.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      InstanceTenancy: default
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName
        - Key: Name
          Value: !Sub ${AWS::StackName}-VPC

  VPCIPv6CidrBlock:
    Type: AWS::EC2::VPCCidrBlock
    Properties:
      VpcId: !Ref VPC
      AmazonProvidedIpv6CidrBlock: true

  PrivateSubnet1RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName
        - Key: Name
          Value: !Sub ${AWS::StackName}-PrivateSubnet1RouteTable

  PrivateSubnet2RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName
        - Key: Name
          Value: !Sub ${AWS::StackName}-PrivateSubnet2RouteTable

  PrivateSubnet1Route:
    Condition: HasPrivateSubnet
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateSubnet1RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref PrivateSubnetGateway1

  PrivateSubnet1RouteIPv6:
    Condition: HasPrivateSubnet
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateSubnet1RouteTable
      DestinationIpv6CidrBlock: ::/0
      EgressOnlyInternetGatewayId: !Ref EgressOnlyInternetGateway

  PrivateSubnet2Route:
    Condition: HasPrivateSubnet
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateSubnet2RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref PrivateSubnetGateway1

  PrivateSubnet2RouteIPv6:
    Condition: HasPrivateSubnet
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateSubnet2RouteTable
      DestinationIpv6CidrBlock: ::/0
      EgressOnlyInternetGatewayId: !Ref EgressOnlyInternetGateway

  EgressOnlyInternetGateway:
    Type: AWS::EC2::EgressOnlyInternetGateway
    Properties:
      VpcId: !Ref VPC

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateSubnet1RouteTable

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateSubnet2RouteTable

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    DependsOn: VPCIPv6CidrBlock
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: !Select [8, !Cidr [!GetAtt [VPC, CidrBlock], 16, 12]]
      MapPublicIpOnLaunch: false
      AssignIpv6AddressOnCreation: true
      Ipv6CidrBlock:
        Fn::Select:
          - 0
          - Fn::Cidr:
            - Fn::Select:
              - 0
              - Fn::GetAtt:
                - VPC
                - Ipv6CidrBlocks
            - 256
            - 64
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName
        - Key: Name
          Value: !Sub ${AWS::StackName}-PrivateSubnet1

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    DependsOn: VPCIPv6CidrBlock
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [1, !GetAZs ""]
      CidrBlock: !Select [9, !Cidr [!GetAtt [VPC, CidrBlock], 16, 12]]
      MapPublicIpOnLaunch: false
      AssignIpv6AddressOnCreation: true
      Ipv6CidrBlock:
        Fn::Select:
          - 1
          - Fn::Cidr:
            - Fn::Select:
              - 0
              - Fn::GetAtt:
                - VPC
                - Ipv6CidrBlocks
            - 256
            - 64
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName
        - Key: Name
          Value: !Sub ${AWS::StackName}-PrivateSubnet2

  PrivateSubnetGateway1:
    Condition: HasPrivateSubnet
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatGatewayElasticIP.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName
        - Key: Name
          Value: !Sub ${AWS::StackName}-PrivateSubnetGateway1

  NatGatewayElasticIP:
    Condition: HasPrivateSubnet
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName
        - Key: Name
          Value: !Sub ${AWS::StackName}-NatGatewayElasticIP

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    DependsOn: VPCIPv6CidrBlock
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: !Select [0, !Cidr [!GetAtt [VPC, CidrBlock], 16, 12]]
      MapPublicIpOnLaunch: !If [IsPrivateOnly, false, true]
      AssignIpv6AddressOnCreation: true
      Ipv6CidrBlock:
        Fn::Select:
          - 3
          - Fn::Cidr:
            - Fn::Select:
              - 0
              - Fn::GetAtt:
                - VPC
                - Ipv6CidrBlocks
            - 256
            - 64
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName
        - Key: Name
          Value: !Sub ${AWS::StackName}-PublicSubnet1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    DependsOn: VPCIPv6CidrBlock
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [1, !GetAZs ""]
      CidrBlock: !Select [1, !Cidr [!GetAtt [VPC, CidrBlock], 16, 12]]
      MapPublicIpOnLaunch: !If [IsPrivateOnly, false, true]
      AssignIpv6AddressOnCreation: true
      Ipv6CidrBlock:
        Fn::Select:
          - 4
          - Fn::Cidr:
            - Fn::Select:
              - 0
              - Fn::GetAtt:
                - VPC
                - Ipv6CidrBlocks
            - 256
            - 64
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName
        - Key: Name
          Value: !Sub ${AWS::StackName}-PublicSubnet2

  S3VpcEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName:
        Fn::Sub: "com.amazonaws.${AWS::Region}.s3"
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PublicRouteTable
        - !Ref PrivateSubnet1RouteTable
        - !Ref PrivateSubnet2RouteTable

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName
        - Key: Name
          Value: !Sub ${AWS::StackName}-InternetGateway

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName
        - Key: Name
          Value: !Sub ${AWS::StackName}-PublicRouteTable

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicRouteIPv6:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationIpv6CidrBlock: ::/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  SubnetRouteTableAssociation2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  # --- EFS Resources ---
  EfsFileSystem:
    Condition: CreateEfs
    Type: AWS::EFS::FileSystem
    UpdateReplacePolicy: Retain
    DeletionPolicy: RetainExceptOnCreate
    Properties:
      Encrypted: true
      FileSystemTags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName
        - Key: Name
          Value: !Sub ${AWS::StackName}-EFS

  EfsSecurityGroup:
    Condition: CreateEfs
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "Allow NFS traffic from RunsOn EC2 instances to EFS ${AWS::StackName}"
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !GetAtt SecurityGroup.GroupId
          Description: "Allow NFS from RunsOn EC2 instances"
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName
        - Key: Name
          Value: !Sub ${AWS::StackName}-EFSSecurityGroup

  EfsMountTarget1:
    Condition: CreateEfs
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SubnetId: !Ref PublicSubnet1 # Mount in public subnet for simplicity, runners in private can still reach
      SecurityGroups:
        - !Ref EfsSecurityGroup

  EfsMountTarget2:
    Condition: CreateEfs
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SubnetId: !Ref PublicSubnet2
      SecurityGroups:
        - !Ref EfsSecurityGroup

  # --- End EFS Resources ---

  # --- Ephemeral Registry Resources ---
  EphemeralRegistry:
    Condition: CreateEphemeralRegistry
    Type: AWS::ECR::Repository
    UpdateReplacePolicy: Retain
    DeletionPolicy: RetainExceptOnCreate
    Properties:
      ImageScanningConfiguration:
        ScanOnPush: false
      ImageTagMutability: MUTABLE
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Expire images older than 10 days",
                "selection": {
                  "tagStatus": "any",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": 10
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName
  # --- End Ephemeral Registry Resources ---

  EC2FleetLaunchTemplateLinuxDefault:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      TagSpecifications:
        - ResourceType: launch-template
          Tags:
            - Key: !Ref CostAllocationTag
              Value: !Ref AWS::StackName
            - Key: runs-on-stack-name
              Value: !Ref AWS::StackName
            - Key: "runs-on/launch-template-name"
              Value: !Join ["-", [!Ref AWS::StackName, "LinuxDefault"]]
      LaunchTemplateData:
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: !Ref CostAllocationTag
                Value: !Ref AWS::StackName
              - Key: runs-on-stack-name
                Value: !Ref AWS::StackName
          - ResourceType: volume
            Tags:
              - Key: !Ref CostAllocationTag
                Value: !Ref AWS::StackName
              - Key: runs-on-stack-name
                Value: !Ref AWS::StackName
          - ResourceType: network-interface
            Tags:
              - Key: !Ref CostAllocationTag
                Value: !Ref AWS::StackName
              - Key: runs-on-stack-name
                Value: !Ref AWS::StackName
        IamInstanceProfile:
          Arn: !GetAtt EC2InstanceProfile.Arn
        EbsOptimized: "true"
        MetadataOptions:
          HttpTokens: required
          HttpPutResponseHopLimit: 2
        InstanceInitiatedShutdownBehavior: "terminate"
        NetworkInterfaces:
          - DeleteOnTermination: true
            DeviceIndex: "0"
            AssociatePublicIpAddress: !If [IsPrivateOnly, false, true]
            Groups:
              - !Ref SecurityGroup
            Ipv6AddressCount: !If [HasIpv6Enabled, 1, 0]
        UserData:
          Fn::Base64: !Sub
            # BEGIN AUTO-GENERATED LINUX USER-DATA
            - |
              #!/bin/bash -ex
              date -u
              mkdir -p /etc/runs-on /runs-on
              cat <<EOF > /etc/runs-on/bootstrap.env
              RUNS_ON_RUNNER_MAX_RUNTIME="${RunnerMaxRuntime}"
              RUNS_ON_LOG_GROUP_NAME="${EC2InstanceLogGroup}"
              AWS_REGION="${Region}"
              RUNS_ON_S3_BUCKET_CACHE="${S3BucketCache}"
              RUNS_ON_ROLE_ID="${RoleId}"
              RUNS_ON_BOOTSTRAP_TAG="${BootstrapTag}"
              RUNS_ON_APP_TAG="${AppTag}"
              RUNS_ON_AGENT_S3_BUCKET="${AgentS3Bucket}"
              ${EfsEnvLine}
              ${EphemeralRegistryEnvLine}
              EOF

              cat <<'EOF' > /usr/local/bin/runs-on-bootstrap.sh
              #!/bin/bash
              set -euo pipefail

              set -a
              . /etc/runs-on/bootstrap.env
              set +a

              BOOTSTRAP_BIN="/usr/local/bin/runs-on-bootstrap-$RUNS_ON_BOOTSTRAP_TAG"
              AGENT_BINARY_URL="$RUNS_ON_AGENT_S3_BUCKET/agent-linux-$(uname -m)"

              _the_end() {
                exit_code=$?
                if [ "$exit_code" -ne 0 ] ; then
                  echo "Bootstrap exited with error ($exit_code). Sleeping 60s for troubleshooting/log shipping..."
                  sleep 60
                fi

                echo "THE END"
                shutdown -h now
              }
              trap _the_end EXIT INT TERM

              if [ ! -f "$BOOTSTRAP_BIN" ]; then
                time curl -L --connect-timeout 3 --max-time 15 --retry 5 -s \
                  "https://github.com/runs-on/bootstrap/releases/download/$RUNS_ON_BOOTSTRAP_TAG/bootstrap-$RUNS_ON_BOOTSTRAP_TAG-linux-$(uname -m)" \
                  -o "$BOOTSTRAP_BIN"
              fi

              chmod a+x "$BOOTSTRAP_BIN"
              "$BOOTSTRAP_BIN" --exec --post-exec shutdown "$AGENT_BINARY_URL"
              EOF
              chmod a+x /usr/local/bin/runs-on-bootstrap.sh

              cat <<'EOF' > /etc/systemd/system/runs-on-bootstrap.service
              [Unit]
              Description=RunsOn Bootstrap Service
              After=network-online.target local-fs.target
              Wants=network-online.target
              Requires=local-fs.target

              [Service]
              Type=simple
              ExecStart=/bin/bash -lc '/usr/local/bin/runs-on-bootstrap.sh 2>&1 | tee -a /runs-on/output.log /var/log/cloud-init-output.log'
              StandardOutput=journal+console
              StandardError=journal+console
              Restart=no

              [Install]
              WantedBy=multi-user.target
              EOF

              if ! systemctl --no-block enable --now runs-on-bootstrap.service; then
                echo "Failed to enable/start runs-on-bootstrap.service via systemd, falling back to inline bootstrap."
                /usr/local/bin/runs-on-bootstrap.sh 2>&1 | tee -a /runs-on/output.log /var/log/cloud-init-output.log
              fi
            # END AUTO-GENERATED LINUX USER-DATA
            - RunnerMaxRuntime: !Ref RunnerMaxRuntime
              EC2InstanceLogGroup: !Ref EC2InstanceLogGroup
              Region: !Ref AWS::Region
              S3BucketCache: !Ref S3BucketCache
              RoleId: !GetAtt EC2InstanceRole.RoleId
              AppTag: !FindInMap [App, Tags, AppTag]
              BootstrapTag: !FindInMap [App, Tags, BootstrapTag]
              AgentS3Bucket: !Join ["", ["s3://", !Ref S3BucketCache, "/agents/", !FindInMap [App, Tags, AppTag]]]
              EfsEnvLine: !If [CreateEfs, !Sub 'RUNS_ON_EFS_ID="${EfsFileSystem}"', '']
              EphemeralRegistryEnvLine: !If [CreateEphemeralRegistry, !Sub 'RUNS_ON_ECR_CACHE="${EphemeralRegistry.RepositoryUri}"', '']

  EC2FleetLaunchTemplateWindowsDefault:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      TagSpecifications:
        - ResourceType: launch-template
          Tags:
            - Key: !Ref CostAllocationTag
              Value: !Ref AWS::StackName
            - Key: runs-on-stack-name
              Value: !Ref AWS::StackName
            - Key: "runs-on/launch-template-name"
              Value: !Join ["-", [!Ref AWS::StackName, "WindowsDefault"]]
      LaunchTemplateData:
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: !Ref CostAllocationTag
                Value: !Ref AWS::StackName
              - Key: runs-on-stack-name
                Value: !Ref AWS::StackName
          - ResourceType: volume
            Tags:
              - Key: !Ref CostAllocationTag
                Value: !Ref AWS::StackName
              - Key: runs-on-stack-name
                Value: !Ref AWS::StackName
          - ResourceType: network-interface
            Tags:
              - Key: !Ref CostAllocationTag
                Value: !Ref AWS::StackName
              - Key: runs-on-stack-name
                Value: !Ref AWS::StackName
        IamInstanceProfile:
          Arn: !GetAtt EC2InstanceProfile.Arn
        EbsOptimized: "true"
        MetadataOptions:
          HttpTokens: required
          HttpPutResponseHopLimit: 2
        InstanceInitiatedShutdownBehavior: "terminate"
        NetworkInterfaces:
          - DeleteOnTermination: true
            DeviceIndex: "0"
            AssociatePublicIpAddress: !If [IsPrivateOnly, false, true]
            Groups:
              - !Ref SecurityGroup
            Ipv6AddressCount: !If [HasIpv6Enabled, 1, 0]
        UserData:
          Fn::Base64: !Sub
            # BEGIN AUTO-GENERATED WINDOWS USER-DATA
            - |
              <powershell>
              Get-Date -format s
              $env:RUNS_ON_RUNNER_MAX_RUNTIME = "${RunnerMaxRuntime}"
              $env:RUNS_ON_LOG_GROUP_NAME = "${EC2InstanceLogGroup}"
              $env:AWS_REGION = "${Region}"
              $env:RUNS_ON_S3_BUCKET_CACHE = "${S3BucketCache}"
              ${EfsEnvLine}
              ${EphemeralRegistryEnvLine}
              # Enable and start SSM Agent service
              try {
                Set-Service -Name "AmazonSSMAgent" -StartupType Automatic -ErrorAction SilentlyContinue
                Start-Service -Name "AmazonSSMAgent" -ErrorAction SilentlyContinue
                Write-Output "SSM Agent service enabled and started"
              } catch {
                Write-Output "Warning: Failed to start SSM Agent service: $($_.Exception.Message)"
              }
              $bootstrapBin = "C:\runs-on\bootstrap-${BootstrapTag}.exe"
              $bootstrapFailed = $false
              $bootstrapExitCode = 0
              try {
                New-Item -ItemType Directory -Force -Path (Split-Path $bootstrapBin)
                if (-not (Test-Path $bootstrapBin)) {
                  # Enable TLS 1.2 for Windows Server 2016 compatibility
                  [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
                  # Disable progress bar for much faster downloads (can be 100x faster)
                  $ProgressPreference = 'SilentlyContinue'
                  Invoke-WebRequest -Uri "https://github.com/runs-on/bootstrap/releases/download/${BootstrapTag}/bootstrap-${BootstrapTag}-windows-$env:PROCESSOR_ARCHITECTURE.exe" -OutFile $bootstrapBin -UseBasicParsing
                }
                Add-MpPreference -ExclusionProcess $bootstrapBin -ErrorAction SilentlyContinue
                & $bootstrapBin --exec --post-exec shutdown "${AgentS3Bucket}/agent-windows-$env:PROCESSOR_ARCHITECTURE.exe"
                $bootstrapExitCode = $LASTEXITCODE
                if ($bootstrapExitCode -ne 0) {
                  throw "Bootstrap exited with code $bootstrapExitCode"
                }
              } catch {
                $bootstrapFailed = $true
                if ($bootstrapExitCode -eq 0) {
                  $bootstrapExitCode = 1
                }
                Write-Output "Bootstrap failed: $($_.Exception.Message)"
                throw
              } finally {
                if ($bootstrapFailed) {
                  Write-Output "Bootstrap failed (exit code $bootstrapExitCode). Sleeping 60s for troubleshooting/log shipping..."
                  Start-Sleep -Seconds 60
                }
                Write-Output "user-data: Going to shut down now..."
                Stop-Computer -Force
              }
              </powershell>
              <detach>true</detach>
              <persist>true</persist>
            # END AUTO-GENERATED WINDOWS USER-DATA
            - RunnerMaxRuntime: !Ref RunnerMaxRuntime
              EC2InstanceLogGroup: !Ref EC2InstanceLogGroup
              Region: !Ref AWS::Region
              S3BucketCache: !Ref S3BucketCache
              BootstrapTag: !FindInMap [App, Tags, BootstrapTag]
              AgentS3Bucket: !Join ["", ["s3://", !Ref S3BucketCache, "/agents/", !FindInMap [App, Tags, AppTag]]]
              EfsEnvLine: !If [CreateEfs, !Sub '$env:RUNS_ON_EFS_ID = "${EfsFileSystem}"', '']
              EphemeralRegistryEnvLine: !If [CreateEphemeralRegistry, !Sub '$env:RUNS_ON_ECR_CACHE = "${EphemeralRegistry.RepositoryUri}"', '']

