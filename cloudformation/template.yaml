                  - secretsmanager:GetSecretValue
                Resource:
                  - !Ref RunsOnStackConfigSecret
                  - !Ref RunsOnGitHubAppsSecret
              - Effect: Allow
                Action:
                  - ec2:TerminateInstances
                  - ec2:StopInstances
                  - ec2:StartInstances
                Resource: !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:instance/*"
                Condition:
                  StringEquals:
                    "aws:ResourceTag/runs-on-stack-name": !Ref AWS::StackName
              - Effect: Allow
                Action:
                  - ec2:DeleteVolume
                  - ec2:DeleteSnapshot
                Resource: "*"
                Condition:
                  StringEquals:
                    "aws:ResourceTag/runs-on-stack-name": !Ref AWS::StackName
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - Fn::Sub: arn:aws:s3:::${S3BucketCache}
                  - Fn::Sub: arn:aws:s3:::${S3BucketCache}/*
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource:
                  - Fn::Sub: arn:aws:s3:::${S3BucketCache}/runners/*
                  - Fn::Sub: arn:aws:s3:::${S3BucketCache}/agents/*
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref AlertTopic
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                  - sqs:ReceiveMessage
                  - sqs:ChangeMessageVisibility
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource:
                  - !GetAtt RunsOnQueueWebhooks.Arn
                  - !GetAtt RunsOnQueueSystem.Arn
                  - !GetAtt RunsOnQueueEvents.Arn
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                Resource: !GetAtt RunsOnLocksTable.Arn
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:BatchGetItem
                  - dynamodb:UpdateItem
                  - dynamodb:Scan
                Resource:
                  - !GetAtt RunsOnWorkflowJobsTable.Arn
                  - !Sub "${RunsOnWorkflowJobsTable.Arn}/index/*"
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogStreams
                Resource:
                  - !Sub "${RunsOnWorkerLogGroup.Arn}:*"

  RunsOnWorkerTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${AWS::StackName}-runs-on-worker"
      Cpu: !FindInMap [AppSize, !Ref AppSize, Cpu]
      Memory: !FindInMap [AppSize, !Ref AppSize, Memory]
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt RunsOnWorkerExecutionRole.Arn
      TaskRoleArn: !GetAtt RunsOnServiceRole.Arn
      RuntimePlatform:
        CpuArchitecture: ARM64
        OperatingSystemFamily: LINUX
      ContainerDefinitions:
        - Name: runs-on-worker
          Image: !Sub
            - "${AppRegistry}:${ImageTag}"
            - ImageTag: !FindInMap [App, Tags, ImageTag]
          Essential: true
          Command:
            - /app/dist/flexd
          Environment:
            - Name: RUNS_ON_ENV
              Value: !Ref Environment
            - Name: RUNS_ON_STACK_NAME
              Value: !Ref AWS::StackName
            - Name: RUNS_ON_APP_TAG
              Value: !FindInMap [App, Tags, AppTag]
            - Name: RUNS_ON_STACK_CONFIG_SECRET_ARN
              Value: !Ref RunsOnStackConfigSecret
            - Name: RUNS_ON_STACK_CONFIG_SECRET_VERSION
              Value: !GetAtt StackConfigMaterializer.StackConfigSecretVersion
            - Name: RUNS_ON_GITHUB_APPS_SECRET_ARN
              Value: !Ref RunsOnGitHubAppsSecret
            - Name: OTEL_EXPORTER_OTLP_ENDPOINT
              Value: !Ref OtelExporterEndpoint
            - Name: OTEL_EXPORTER_OTLP_HEADERS
              Value: !Ref OtelExporterHeaders
            - Name: OTEL_EXPORTER_OTLP_TEMPORALITY
              Value: !Ref OtelExporterTemporality
            - Name: RUNS_ON_LOGGER_LEVEL
              Value: !Ref LoggerLevel
          HealthCheck:
            Command:
              - CMD
              - /app/dist/healthprobe
            Interval: 5
            Timeout: 5
            Retries: 3
            StartPeriod: 15
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref RunsOnWorkerLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: runs-on-worker
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName

  RunsOnWorkerService:
    Type: AWS::ECS::Service
    Properties:
      Cluster: !Ref RunsOnWorkerCluster
      DesiredCount: !If [MaintenanceModeEnabled, 0, 1]
      LaunchType: FARGATE
      PlatformVersion: LATEST
      TaskDefinition: !Ref RunsOnWorkerTaskDefinition
      PropagateTags: SERVICE
      EnableECSManagedTags: true
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 0
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: !If [HasPrivateSubnet, DISABLED, ENABLED]
          SecurityGroups: [!Ref SecurityGroup]
          Subnets: !If
            - HasPrivateSubnet
            - [!Ref PrivateSubnet1, !Ref PrivateSubnet2]
            - [!Ref PublicSubnet1, !Ref PublicSubnet2]
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName

  DailyCostBudget:
    Type: AWS::Budgets::Budget
    Properties:
      Budget:
        BudgetName: !Sub "${AWS::StackName}-app-daily-budget"
        BudgetType: COST
        TimeUnit: DAILY
        BudgetLimit:
          Amount: !Ref AppBudgetDailyUsd
          Unit: USD
        CostFilters:
          TagKeyValue:
            - !Join
              - ""
              - - "user:"
                - !Ref CostAllocationTag
                - "$"
                - !Ref AWS::StackName
      NotificationsWithSubscribers:
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            ThresholdType: PERCENTAGE
            Threshold: 100
          Subscribers:
            - SubscriptionType: SNS
              Address: !Ref AlertTopic
      ResourceTags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName

  RunsOnQueueWebhooksDeadLetter:
    Type: AWS::SQS::Queue
    Properties:
      FifoQueue: true
      MessageRetentionPeriod: 259200 # 3 days
      SqsManagedSseEnabled: true

  RunsOnQueueWebhooksDeadLetterPolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref RunsOnQueueWebhooksDeadLetter
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: "sqs:SendMessage"
            Resource: !GetAtt RunsOnQueueWebhooksDeadLetter.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref RunsOnQueueWebhooks

  RunsOnQueueWebhooks:
    Type: AWS::SQS::Queue
    Properties:
      FifoQueue: true
      ContentBasedDeduplication: false
      MessageRetentionPeriod: 86400 # 24h
      ReceiveMessageWaitTimeSeconds: 10
      VisibilityTimeout: 120 # AWS recommends 6 times the max processing time
      SqsManagedSseEnabled: true
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt RunsOnQueueWebhooksDeadLetter.Arn
        maxReceiveCount: 3
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName

  RunsOnQueueSystemDeadLetter:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 259200 # 3 days
      FifoQueue: true
      SqsManagedSseEnabled: true
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName

  RunsOnQueueSystem:
    Type: AWS::SQS::Queue
    Properties:
      FifoQueue: true
      ContentBasedDeduplication: true
      MessageRetentionPeriod: 86400 # 24h
      ReceiveMessageWaitTimeSeconds: 10
      VisibilityTimeout: 120
      SqsManagedSseEnabled: true
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt RunsOnQueueSystemDeadLetter.Arn
        maxReceiveCount: 3
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName

  RunsOnQueueEvents:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 7200
      ReceiveMessageWaitTimeSeconds: 20
      VisibilityTimeout: 120
      SqsManagedSseEnabled: true
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName

  # DynamoDB table for distributed locking
  RunsOnLocksTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-locks"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: key
          AttributeType: S
      KeySchema:
        - AttributeName: key
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName

  # DynamoDB table for workflow job tracking
  RunsOnWorkflowJobsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-workflow-jobs"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: job_id
          AttributeType: N
        - AttributeName: reconcile_partition
          AttributeType: S
        - AttributeName: reconcile_after_unix
          AttributeType: N
        - AttributeName: pending_work_partition
          AttributeType: S
        - AttributeName: pending_work_not_before_unix
          AttributeType: N
        - AttributeName: created_at_date
          AttributeType: S
        - AttributeName: created_at_unix
          AttributeType: N
      KeySchema:
        - AttributeName: job_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: reconcile-index
          KeySchema:
            - AttributeName: reconcile_partition
              KeyType: HASH
            - AttributeName: reconcile_after_unix
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: pending-work-index
          KeySchema:
            - AttributeName: pending_work_partition
              KeyType: HASH
            - AttributeName: pending_work_not_before_unix
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: daily-activity-index
          KeySchema:
            - AttributeName: created_at_date
              KeyType: HASH
            - AttributeName: created_at_unix
              KeyType: RANGE
          Projection:
            ProjectionType: INCLUDE
            NonKeyAttributes:
              - installation_id
              - org_name
              - repo_name
              - job_id
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName

  SpotInstanceEventRule:
    Type: AWS::Events::Rule
    Properties:
      Description: "Rule to capture EC2 Spot Instance interruption notices"
      EventPattern:
        source:
          - aws.ec2
        detail-type:
          - EC2 Spot Instance Interruption Warning
          - EC2 Instance State-change Notification
      State: ENABLED
      Targets:
        - Arn: !GetAtt RunsOnQueueEvents.Arn
          Id: InstanceEvents

  SpotInstanceEventRulePermission:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref RunsOnQueueEvents
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt RunsOnQueueEvents.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !GetAtt SpotInstanceEventRule.Arn

  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName
      DisplayName: RunsOn Alerts

  AlertTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref AlertTopic
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowBudgetsPublish
            Effect: Allow
            Principal:
              Service: budgets.amazonaws.com
            Action: sns:Publish
            Resource: !Ref AlertTopic
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId

  AlertTopicSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: email
      TopicArn: !Ref AlertTopic
      Endpoint: !Ref EmailAddress

  AlertTopicSlackWebhookRole:
    Condition: AlertTopicSlackWebhookProvided
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName

  AlertTopicSlackWebhookFunction:
    Condition: AlertTopicSlackWebhookProvided
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.11
      Handler: index.handler
      Role: !GetAtt AlertTopicSlackWebhookRole.Arn
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          SLACK_WEBHOOK_URL: !Ref AlertTopicSlackWebhookUrl
          STACK_NAME: !Ref AWS::StackName
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName
      Code:
        ZipFile: |
          import json,logging,os,time,urllib.error,urllib.request
          logger=logging.getLogger()
          logger.setLevel(logging.INFO)
          STATE_COLORS={"alarm":"danger","ok":"good","insufficient_data":"warning"}
          STATE_EMOJI={"ALARM":":rotating_light:","OK":":white_check_mark:","INSUFFICIENT_DATA":":warning:"}

          def get_alert_color(subject,state=None):
              if state:
                  return STATE_COLORS.get(state.lower(),"#439FE0")
              subject=(subject or "").lower()
              if any(word in subject for word in ("error","fail","❌")):
                  return "danger"
              if any(word in subject for word in ("warn","⚠️","unable")):
                  return "warning"
              if any(word in subject for word in ("success","✅","complete")):
                  return "good"
              return "#439FE0"

          def handler(event,context):
              webhook_url=os.environ.get("SLACK_WEBHOOK_URL")
              stack_name=os.environ.get("STACK_NAME","RunsOn")
              if not webhook_url:
                  logger.error("Slack webhook URL is not configured")
                  return {"statusCode":500,"body":"Slack webhook URL is not configured"}
              for record in event.get("Records",[]):
                  sns=record.get("Sns",{})
                  subject=sns.get("Subject","")
                  message=sns.get("Message","")
                  title=subject or "Alert"
                  text=message
                  color=get_alert_color(subject)
                  try:
                      alarm_data=json.loads(message)
                      if "AlarmName" in alarm_data:
                          state=alarm_data.get("NewStateValue","UNKNOWN")
                          title=f'{STATE_EMOJI.get(state,":question:")} CloudWatch Alarm: {state}'
                          text=f"*Alarm:* {alarm_data.get('AlarmName','N/A')}\n*Reason:* {alarm_data.get('NewStateReason','N/A')}"
                          color=get_alert_color(None,state)
                      else:
                          title=subject or "JSON Message"
                          text=f"```\n{json.dumps(alarm_data,indent=2)}\n```"
                  except (json.JSONDecodeError,TypeError):
                      pass
                  data=json.dumps({"username":stack_name,"icon_url":"https://runs-on.com/logo.png","attachments":[{"color":color,"title":title,"text":text,"footer":stack_name,"ts":int(time.time())}]}).encode("utf-8")
                  request=urllib.request.Request(webhook_url,data=data,headers={"Content-Type":"application/json"},method="POST")
                  try:
                      with urllib.request.urlopen(request,timeout=5) as response:
                          logger.info("Sent alert to Slack with status %s", response.status)
                  except urllib.error.HTTPError as error:
                      logger.error("Failed to send alert to Slack: HTTP %s %s", error.code, error.reason)
                  except Exception as error:  # noqa: BLE001
                      logger.exception("Unexpected error sending alert to Slack: %s", error)
              return {"statusCode":200,"body":"Processed SNS records"}

  AlertTopicSlackWebhookPermission:
    Condition: AlertTopicSlackWebhookProvided
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref AlertTopicSlackWebhookFunction
      Principal: sns.amazonaws.com
      SourceArn: !Ref AlertTopic

  AlertTopicSlackWebhookSubscription:
    Condition: AlertTopicSlackWebhookProvided
    Type: AWS::SNS::Subscription
    DependsOn:
      - AlertTopicSlackWebhookPermission
    Properties:
      Protocol: lambda
      TopicArn: !Ref AlertTopic
      Endpoint: !GetAtt AlertTopicSlackWebhookFunction.Arn

  RunsOnDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0,
              "y": 0,
              "width": 6,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/SQS", "ApproximateNumberOfMessagesVisible", "QueueName", "${RunsOnQueueWebhooks.QueueName}" ]
                ],
                "period": 300,
                "stat": "Maximum",
                "region": "${AWS::Region}",
                "title": "Jobs Currently Queued",
                "view": "timeSeries"
              }
            },
            {
              "type": "log",
              "x": 6,
              "y": 0,
              "width": 6,
              "height": 6,
              "properties": {
                "query": "SOURCE '${RunsOnWorkerLogGroup}'\n| filter metric_type = \"job_event\" and status = \"scheduled\"\n| stats count() as RunnersScheduled",
                "region": "${AWS::Region}",
                "title": "Total Runners Scheduled (Current Period)",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 0,
              "width": 6,
              "height": 6,
              "properties": {
                "query": "SOURCE '${RunsOnWorkerLogGroup}'\n| filter metric_type = \"job_event\" and status = \"scheduled\"\n| stats count() as RunnersScheduled by bin(5m) as t\n| sort t asc",
                "region": "${AWS::Region}",
                "title": "Runners Scheduled over time (5min intervals)",
                "view": "timeSeries"
              }
            },
            {
              "type": "log",
              "x": 18,
              "y": 0,
              "width": 6,
              "height": 6,
              "properties": {
                "query": "SOURCE '${RunsOnWorkerLogGroup}'\n| filter metric_type = \"job_event\" and ispresent(overall_queue_duration_seconds)\n| stats pct(internal_queue_duration_seconds, 90) as internal_P90, pct(internal_queue_duration_seconds, 50) as internal_P50, pct(overall_queue_duration_seconds, 90) as overall_P90, pct(overall_queue_duration_seconds, 50) as overall_P50 by bin(1m) as t\n| sort t asc",
                "region": "${AWS::Region}",
                "title": "Internal/Overall Queue Duration Percentiles (P50/P90)",
                "view": "timeSeries",
                "yAxis": {
                  "left": {
                    "min": 0,
                    "label": "Seconds"
                  }
                }
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${RunsOnWorkerLogGroup}'\n| filter level = \"error\"\n| fields @timestamp, message\n| sort @timestamp desc\n| limit 50",
                "region": "${AWS::Region}",
                "title": "Recent Error Messages (Latest 50)",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${RunsOnWorkerLogGroup}'\n| filter metric_type = \"snapshot\"\n| fields @timestamp, spot_circuit_breaker.active as active, spot_circuit_breaker.interruption_count as interruption_count\n| stats min(active) as circuit_breaker_active, min(interruption_count) as interruptions by bin(1m) as t\n| sort t asc",
                "region": "${AWS::Region}",
                "title": "Spot Circuit Breaker Status",
                "view": "timeSeries"
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 12,
              "width": 24,
              "height": 6,
              "properties": {
                "query": "SOURCE '${RunsOnWorkerLogGroup}'\n| filter metric_type = \"spot_interruption\"\n| fields @timestamp, interruption_time, trip_count, recovery_minutes, circuit_breaker_active\n| sort @timestamp desc\n| limit 50",
                "region": "${AWS::Region}",
                "title": "Recent Spot Interruptions (Last 50)",
                "view": "table"
              }
            }
          ]
        }

Outputs:
  RunsOnAwsAccountId:
    Description: AWS Account ID
    Value: !Ref AWS::AccountId
  RunsOnEntryPoint:
    Description: Entrypoint for the RunsOn service
    Value: !Sub "https://${RunsOnPublicIngressRestApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  RunsOnServiceLogGroupName:
    Description: Log group for the RunsOn service
    Value: !Ref RunsOnWorkerLogGroup
  RunsOnAppTag:
    Description: RunsOn application tag
    Value: !FindInMap [App, Tags, AppTag]
  RunsOnInstanceRoleName:
    Description: Name of the instance role for the RunsOn service
    Value: !Ref EC2InstanceRole
  RunsOnRegion:
    Description: AWS region
    Value: !Ref AWS::Region
  RunsOnVPCId:
    Description: VPC ID
    Value: !Ref VPC
    Export:
      Name: !Sub "${AWS::StackName}-VPCId"
  RunsOnPublicSubnetIds:
    Description: Public subnet IDs
    Value: !Join [",", [!Ref PublicSubnet1, !Ref PublicSubnet2]]
  RunsOnPrivateSubnetIds:
    Description: Private subnet IDs
    Value: !Join [",", [!Ref PrivateSubnet1, !Ref PrivateSubnet2]]
  RunsOnEgressStaticIps:
    Description: Static IPs for egress traffic (if configured)
    Value: !If [HasPrivateSubnet, !Ref NatGatewayElasticIP, ""]
  RunsOnSecurityGroupId:
    Description: Security group for runners
    Value: !Ref SecurityGroup
  RunsOnBucketCache:
    Description: S3 bucket for storing cache artifacts
    Value: !Ref S3BucketCache
  RunsOnTopicArn:
    Description: SNS Topic where email alerts and reports are sent
    Value: !Ref AlertTopic
  RunsOnLaunchTemplateLinuxDefault:
    Description: Default Linux launch template for the RunsOn service
    Value: !Sub "${EC2FleetLaunchTemplateLinuxDefault}:${EC2FleetLaunchTemplateLinuxDefault.LatestVersionNumber}"
  RunsOnLaunchTemplateLinuxDefaultNested:
    Description: Default Linux nested launch template for the RunsOn service
    Value: !GetAtt ManagedLaunchTemplateLinuxDefaultNested.LaunchTemplateRef
  RunsOnLaunchTemplateWindowsDefault:
    Description: Default Windows launch template for the RunsOn service
    Value: !Sub "${EC2FleetLaunchTemplateWindowsDefault}:${EC2FleetLaunchTemplateWindowsDefault.LatestVersionNumber}"
  RunsOnLaunchTemplateWindowsDefaultNested:
    Description: Default Windows nested launch template for the RunsOn service
    Value: !GetAtt ManagedLaunchTemplateWindowsDefaultNested.LaunchTemplateRef
  RunsOnLaunchTemplateLinuxPrivate:
    Description: Private Linux launch template for the RunsOn service
    Value: !GetAtt ManagedLaunchTemplateLinuxPrivate.LaunchTemplateRef
  RunsOnLaunchTemplateLinuxPrivateNested:
    Description: Private Linux nested launch template for the RunsOn service
    Value: !GetAtt ManagedLaunchTemplateLinuxPrivateNested.LaunchTemplateRef
  RunsOnLaunchTemplateWindowsPrivate:
    Description: Private Windows launch template for the RunsOn service
    Value: !GetAtt ManagedLaunchTemplateWindowsPrivate.LaunchTemplateRef
  RunsOnLaunchTemplateWindowsPrivateNested:
    Description: Private Windows nested launch template for the RunsOn service
    Value: !GetAtt ManagedLaunchTemplateWindowsPrivateNested.LaunchTemplateRef
  RunsOnQueueWebhooks:
    Description: SQS FIFO queue for validated webhook deliveries
    Value: !Ref RunsOnQueueWebhooks
  RunsOnQueueSystem:
    Description: SQS FIFO queue for internal system events
    Value: !Ref RunsOnQueueSystem
  RunsOnQueueEvents:
    Description: SQS queue for the RunsOn service, used for events from other AWS services
    Value: !Ref RunsOnQueueEvents
  RunsOnLocksTable:
    Description: DynamoDB table for distributed locking
    Value: !Ref RunsOnLocksTable
  RunsOnWorkflowJobsTable:
    Description: DynamoDB table for workflow job tracking
    Value: !Ref RunsOnWorkflowJobsTable
  RunsOnServiceArn:
    Description: ARN of the ECS worker service
    Value: !Ref RunsOnWorkerService
  RunsOnServiceRoleArn:
    Description: ARN of the ECS worker task role
    Value: !GetAtt RunsOnServiceRole.Arn
  RunsOnStackConfigSecretArn:
    Description: ARN of the stack config secret
    Value: !Ref RunsOnStackConfigSecret
  RunsOnLicenseStatusParameterName:
    Description: Name of the SSM parameter storing the latest license status
    Value: !Ref RunsOnLicenseStatusParameter
  RunsOnEC2InstanceLogGroupArn:
    Description: Log group ARN for the EC2 instances
    Value: !Ref EC2InstanceLogGroup
  RunsOnEfsFileSystemId:
    Condition: CreateEfs
    Description: EFS File System ID (if enabled)
    Value: !Ref EfsFileSystem
  RunsOnEphemeralRegistryUri:
    Condition: CreateEphemeralRegistry
    Description: ECR Repository URI for Ephemeral Registry (if enabled)
    Value: !GetAtt EphemeralRegistry.RepositoryUri
