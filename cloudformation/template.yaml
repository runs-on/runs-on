      MessageRetentionPeriod: 86400 # 24h
      ReceiveMessageWaitTimeSeconds: 10
      VisibilityTimeout: 120 # 2 minutes for scheduling
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt RunsOnQueueJobsDeadLetter.Arn
        maxReceiveCount: 3
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName

  RunsOnQueueGithubDeadLetter:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 259200 # 3 days
      FifoQueue: true
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName

  RunsOnQueueGithub:
    Type: AWS::SQS::Queue
    Properties:
      FifoQueue: true
      ContentBasedDeduplication: false
      MessageRetentionPeriod: 86400 # 24h
      ReceiveMessageWaitTimeSeconds: 10
      VisibilityTimeout: 120 # GitHub API calls + S3 uploads
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt RunsOnQueueGithubDeadLetter.Arn
        maxReceiveCount: 3
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName

  RunsOnQueuePoolDeadLetter:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 259200 # 3 days
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName

  RunsOnQueuePool:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 86400 # 24h
      ReceiveMessageWaitTimeSeconds: 10
      VisibilityTimeout: 120
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt RunsOnQueuePoolDeadLetter.Arn
        maxReceiveCount: 5
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName

  RunsOnQueueHousekeeping:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 86400 # 24h
      ReceiveMessageWaitTimeSeconds: 20
      VisibilityTimeout: 120
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName

  RunsOnQueueTermination:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 86400 # 24h
      ReceiveMessageWaitTimeSeconds: 20
      VisibilityTimeout: 120
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName

  RunsOnQueueEvents:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 7200
      ReceiveMessageWaitTimeSeconds: 20
      VisibilityTimeout: 120
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName

  # DynamoDB table for distributed locking
  RunsOnLocksTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-locks"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: key
          AttributeType: S
      KeySchema:
        - AttributeName: key
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName

  # DynamoDB table for workflow job tracking
  RunsOnWorkflowJobsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-workflow-jobs"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: job_id
          AttributeType: N
        - AttributeName: next_check_partition
          AttributeType: S
        - AttributeName: next_check_at_unix
          AttributeType: N
        - AttributeName: created_at_date
          AttributeType: S
        - AttributeName: created_at_unix
          AttributeType: N
      KeySchema:
        - AttributeName: job_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: next-check-index
          KeySchema:
            - AttributeName: next_check_partition
              KeyType: HASH
            - AttributeName: next_check_at_unix
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: daily-activity-index
          KeySchema:
            - AttributeName: created_at_date
              KeyType: HASH
            - AttributeName: created_at_unix
              KeyType: RANGE
          Projection:
            ProjectionType: INCLUDE
            NonKeyAttributes:
              - installation_id
              - org_name
              - repo_name
              - job_id
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName

  RunsOnQueueDeadLetterOldestMessageAlarm:
    Condition: CreateSqsQueueOldestMessageAlarms
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: !Sub "SQS queue RunsOnQueueDeadLetter oldest message age excedes ${SqsQueueOldestMessageThresholdSeconds} seconds."
      Namespace: AWS/SQS
      MetricName: ApproximateAgeOfOldestMessage
      Dimensions:
      - Name: QueueName
        Value: !GetAtt RunsOnQueueDeadLetter.QueueName
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 1
      Threshold: !Ref SqsQueueOldestMessageThresholdSeconds
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: "notBreaching"
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic

  RunsOnQueueOldestMessageAlarm:
    Condition: CreateSqsQueueOldestMessageAlarms
