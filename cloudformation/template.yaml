  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Condition: EmbeddedVpc
    Properties:
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName
        - Key: Name
