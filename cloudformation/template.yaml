          ImageIdentifier: !Sub
            - "${AppRegistry}:${ImageTag}"
            - ImageTag: !FindInMap [App, Tags, ImageTag]
          ImageRepositoryType: ECR_PUBLIC

  RunsOnServiceVerifyRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DescribeAppRunnerService
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - apprunner:DescribeService
                  - apprunner:ListOperations
                Resource: !Ref RunsOnService
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName

  RunsOnServiceVerifyFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.11
      Handler: index.handler
      Role: !GetAtt RunsOnServiceVerifyRole.Arn
      Timeout: 900
      MemorySize: 128
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName
      Code:
        ZipFile: |
          import boto3,json,logging,time
          import cfnresponse
          A=boto3.client("apprunner")
          logger=logging.getLogger()
          logger.setLevel(logging.INFO)

          FAILURE_STATUSES={"FAILED","ROLLBACK_IN_PROGRESS","ROLLBACK_FAILED","ROLLBACK_SUCCEEDED"}

          def image_id(service):
              return (((service.get("SourceConfiguration") or {}).get("ImageRepository") or {}).get("ImageIdentifier") or "").strip()

          def latest_op(service_arn):
              ops=A.list_operations(ServiceArn=service_arn,MaxResults=1).get("OperationSummaryList") or []
              return ops[0] if ops else None

          def fmt_op(op):
              if not op:
                  return "no recent operation"
              parts=[str(op.get("Type") or "<unknown-type>"), str(op.get("Status") or "<unknown-status>")]
              if op.get("Id"):
                  parts.append(f"id={op['Id']}")
              return " ".join(parts)

          def fail(event,context,pid,reason):
              logger.error(reason)
              return cfnresponse.send(event,context,cfnresponse.FAILED,{"Reason":reason},pid,reason=reason)

          def handler(event,context):
              logger.info("Received event: %s", json.dumps(event))
              p=event.get("ResourceProperties",{})
              pid="runs-on-apprunner-verify"
              if event["RequestType"]=="Delete":
                  return cfnresponse.send(event,context,cfnresponse.SUCCESS,{},pid)
              try:
                  service_arn=p["ServiceArn"]
                  expected_image=(p.get("ExpectedImageIdentifier") or "").strip()
                  max_wait=int(p.get("MaxWaitSeconds","840"))
                  poll=int(p.get("PollIntervalSeconds","10"))
                  deadline=time.monotonic()+max_wait
                  attempts=0
                  last_status=""
                  last_image=""
                  last_op_text="no recent operation"
                  last_error=""
                  while time.monotonic()<deadline:
                      attempts+=1
                      try:
                          service=(A.describe_service(ServiceArn=service_arn).get("Service") or {})
                          status=(service.get("Status") or "").strip()
                          current_image=image_id(service)
                          last_status=status
                          last_image=current_image
                          if status=="RUNNING" and current_image==expected_image:
                              logger.info("Attempt %s status=%s image=%s", attempts, status, current_image)
                              return cfnresponse.send(event,context,cfnresponse.SUCCESS,{},pid)
                          op=latest_op(service_arn)
                          op_status=((op or {}).get("Status") or "").strip()
                          last_op_text=fmt_op(op)
                          last_error=""
                          logger.info("Attempt %s status=%s image=%s op=%s", attempts, status, current_image, last_op_text)
                          if op_status in FAILURE_STATUSES:
                              return fail(event,context,pid,f"App Runner operation failed after CloudFormation service update: expected image {expected_image}, observed image {current_image or '<empty>'}, service status {status or '<empty>'}, latest operation {last_op_text}")
                      except Exception as e:
                          last_error=str(e)
                          logger.warning("Attempt %s failed to read App Runner state: %s", attempts, last_error)
                      time.sleep(poll)
                  reason=f"Timed out waiting for App Runner to serve expected image {expected_image}: observed image {last_image or '<empty>'}, service status {last_status or '<empty>'}, latest operation {last_op_text}"
                  if last_error:
                      reason=f"{reason}, last probe error {last_error}"
                  return fail(event,context,pid,reason)
              except Exception as e:
                  logger.exception("App Runner verification custom resource failed")
                  return fail(event,context,pid,str(e))

  RunsOnServiceVerifyFunctionVersion:
    Type: AWS::Lambda::Version
    Properties:
      FunctionName: !Ref RunsOnServiceVerifyFunction

  RunsOnServiceVerify:
    Type: Custom::RunsOnServiceVerify
    Properties:
      ServiceToken: !GetAtt RunsOnServiceVerifyFunction.Arn
      RefreshToken: !Ref RunsOnServiceVerifyFunctionVersion
      ServiceArn: !Ref RunsOnService
      ExpectedImageIdentifier: !Sub
        - "${AppRegistry}:${ImageTag}"
        - ImageTag: !FindInMap [App, Tags, ImageTag]
      MaxWaitSeconds: 840
      PollIntervalSeconds: 10

  RunsOnStackConfigSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "/runs-on/${AWS::StackName}/config"
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName

  RunsOnServiceVpcConnector:
    Type: AWS::AppRunner::VpcConnector
    Condition: PrivateEnabled
    Properties:
      Subnets: !If [ExternalVpc, !Ref ExternalVpcPrivateSubnetIds, [!Ref PrivateSubnet1, !Ref PrivateSubnet2, !Ref PrivateSubnet3]]
      SecurityGroups: !If [ExternalVpc, [!Ref ExternalVpcSecurityGroupId], [!Ref SecurityGroup]]
      Tags: # note: adding a new tag requires a full replacement
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName

  ManagedLaunchTemplateRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ManageLaunchTemplates
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ec2:DescribeLaunchTemplateVersions
                  - ec2:CreateLaunchTemplateVersion
                Resource: "*"
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName

  ManagedLaunchTemplateFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.11
      Handler: index.handler
      Role: !GetAtt ManagedLaunchTemplateRole.Arn
      Timeout: 300
      MemorySize: 256
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName
      Code:
        ZipFile: |
          from __future__ import annotations

          import copy
          import hashlib
          import json
          import xml.etree.ElementTree as ET
          from urllib import error as urllib_error, parse as urllib_parse, request as urllib_request

          try:
              import boto3
          except ImportError:
              boto3 = None

          try:
              import cfnresponse
          except ImportError:
              cfnresponse = None

          try:
              from botocore.auth import SigV4Auth
              from botocore.awsrequest import AWSRequest
              from botocore.serialize import create_serializer
          except ImportError:
              SigV4Auth = None
              AWSRequest = None
              create_serializer = None


          SOURCE_FIELDS = (
              "TagSpecifications",
              "IamInstanceProfile",
              "EbsOptimized",
              "MetadataOptions",
              "InstanceInitiatedShutdownBehavior",
              "Monitoring",
              "NetworkInterfaces",
              "UserData",
              "CpuOptions",
          )
          SUPPORTED_CPU_OPTION_FIELDS = ("AmdSevSnp", "CoreCount", "ThreadsPerCore")
          _EC2_CLIENT = None


          def require_dependency(value, name):
              if value is None:
                  raise RuntimeError(f"{name} is unavailable in this environment")
              return value


          def ec2_client():
              global _EC2_CLIENT
              if _EC2_CLIENT is None:
                  require_dependency(boto3, "boto3")
                  _EC2_CLIENT = boto3.client("ec2")
              return _EC2_CLIENT


          def boto3_session(session=None):
              if session is not None:
                  return session
              require_dependency(boto3, "boto3")
              return boto3.session.Session()


          def enabled(value):
              return value in (True, "true", "True")


          def source_launch_template_data(launch_template_id, version, ec2=None):
              client = ec2 or ec2_client()
              versions = client.describe_launch_template_versions(
                  LaunchTemplateId=launch_template_id,
                  Versions=[str(version)],
              )["LaunchTemplateVersions"]
              if not versions:
                  raise RuntimeError(f"launch template source version not found for {launch_template_id}:{version}")
              source = versions[0]["LaunchTemplateData"]
              data = {}
              for field in SOURCE_FIELDS:
                  if field in source:
                      data[field] = copy.deepcopy(source[field])
              return data


          def desired_launch_template_data(properties, ec2=None):
              data = source_launch_template_data(
                  properties["SourceLaunchTemplateId"],
                  properties["SourceLaunchTemplateVersion"],
                  ec2=ec2,
              )
              if enabled(properties.get("Private")):
                  interfaces = copy.deepcopy(data.get("NetworkInterfaces", []))
                  if not interfaces:
                      raise RuntimeError("private managed launch templates require at least one network interface")
                  interfaces[0]["AssociatePublicIpAddress"] = False
                  data["NetworkInterfaces"] = interfaces
              if enabled(properties.get("NestedVirtualization")):
                  cpu = copy.deepcopy(data.get("CpuOptions", {}))
                  cpu["NestedVirtualization"] = "enabled"
                  data["CpuOptions"] = cpu
              return data


          def supported_launch_template_data(data):
              supported = copy.deepcopy(data)
              cpu = supported.get("CpuOptions")
              if isinstance(cpu, dict):
                  filtered = {key: copy.deepcopy(value) for key, value in cpu.items() if key in SUPPORTED_CPU_OPTION_FIELDS}
                  if filtered:
                      supported["CpuOptions"] = filtered
                  else:
                      supported.pop("CpuOptions", None)
              return supported


          def version_description(data):
              payload = json.dumps(data, sort_keys=True, separators=(",", ":"))
              digest = hashlib.sha256(payload.encode()).hexdigest()
              return f"runs-on-derived/{digest}"


          def client_token(launch_template_id, description):
              # EC2 idempotency tokens must remain unique per target launch template even
              # when two templates derive the same payload and therefore share a digest.
              return f"{launch_template_id}/{description}"


          def xml_text(root, name):
              node = root.find(f".//{{*}}{name}")
              if node is not None and node.text:
                  return node.text.strip()
              return ""


          def xml_message(payload):
              try:
                  root = ET.fromstring(payload)
              except ET.ParseError:
                  return payload.decode("utf-8", "replace")
              for name in ("Message", "message"):
                  text = xml_text(root, name)
                  if text:
                      return text
              return payload.decode("utf-8", "replace")


          def query_pairs(body):
              if isinstance(body, dict):
                  return list(body.items())
              if isinstance(body, bytes):
                  body = body.decode("utf-8")
              return urllib_parse.parse_qsl(body, keep_blank_values=True)


          def encoded_query_body(body, nested_enabled):
              pairs = query_pairs(body)
              if nested_enabled:
                  pairs.append(("LaunchTemplateData.CpuOptions.NestedVirtualization", "enabled"))
              return urllib_parse.urlencode(pairs).encode("utf-8")


          def serialize_create_launch_template_version_request(launch_template_id, description, data, ec2=None):
              client = ec2 or ec2_client()
              serializer_factory = require_dependency(create_serializer, "botocore.serialize.create_serializer")
              service_model = client.meta.service_model
              serializer = serializer_factory(service_model.metadata["protocol"])
              request = serializer.serialize_to_request(
                  {
                      "ClientToken": client_token(launch_template_id, description),
                      "LaunchTemplateId": launch_template_id,
                      "LaunchTemplateData": supported_launch_template_data(data),
                      "VersionDescription": description,
                  },
                  service_model.operation_model("CreateLaunchTemplateVersion"),
              )
              body = encoded_query_body(
                  request.get("body", ""),
                  data.get("CpuOptions", {}).get("NestedVirtualization") == "enabled",
              )
              headers = dict(request.get("headers", {}))
              headers.setdefault("Content-Type", "application/x-www-form-urlencoded; charset=utf-8")
              return body, headers


          def signed_ec2_query(body, headers, ec2=None, session=None):
              client = ec2 or ec2_client()
              aws_request_cls = require_dependency(AWSRequest, "botocore.awsrequest.AWSRequest")
              signer_cls = require_dependency(SigV4Auth, "botocore.auth.SigV4Auth")
              credentials = boto3_session(session).get_credentials()
              if credentials is None:
                  raise RuntimeError("aws credentials unavailable for EC2 query signing")
              aws_request = aws_request_cls(
                  method="POST",
                  url=client.meta.endpoint_url,
                  data=body,
                  headers=headers,
              )
              signer_cls(credentials.get_frozen_credentials(), "ec2", client.meta.region_name).add_auth(aws_request)
              prepared = aws_request.prepare()
              signed_body = prepared.body if prepared.body is not None else body
              if isinstance(signed_body, str):
                  signed_body = signed_body.encode("utf-8")
              try:
                  with urllib_request.urlopen(
                      urllib_request.Request(
                          prepared.url,
                          data=signed_body,
                          headers=dict(prepared.headers),
                          method="POST",
                      )
                  ) as response:
                      return response.read()
              except urllib_error.HTTPError as http_error:
                  raise RuntimeError(xml_message(http_error.read()))


          def create_launch_template_version(launch_template_id, description, data, ec2=None, session=None):
              body, headers = serialize_create_launch_template_version_request(
                  launch_template_id,
                  description,
                  data,
                  ec2=ec2,
              )
              root = ET.fromstring(signed_ec2_query(body, headers, ec2=ec2, session=session))
              version = xml_text(root, "versionNumber")
              if not version:
                  raise RuntimeError("launch template version number missing from EC2 response")
              return version


          def matching_version(launch_template_id, description, ec2=None):
              client = ec2 or ec2_client()
              token = None
              while True:
                  params = {"LaunchTemplateId": launch_template_id}
                  if token is not None:
                      params["NextToken"] = token
                  response = client.describe_launch_template_versions(**params)
                  for version in response["LaunchTemplateVersions"]:
                      if version.get("VersionDescription") == description:
                          return str(version["VersionNumber"])
                  token = response.get("NextToken")
                  if token is None:
                      return None


          def ensure_launch_template_version(properties, ec2=None, session=None):
              data = desired_launch_template_data(properties, ec2=ec2)
              description = version_description(data)
              launch_template_id = properties["TargetLaunchTemplateId"]
              version = matching_version(launch_template_id, description, ec2=ec2)
              if version is None:
                  version = create_launch_template_version(
                      launch_template_id,
                      description,
                      data,
                      ec2=ec2,
                      session=session,
                  )
              return launch_template_id, version


          def send_response(event, context, status, data, physical_resource_id, reason=None):
              response_module = require_dependency(cfnresponse, "cfnresponse")
              response_module.send(event, context, status, data, physical_resource_id, reason=reason)


          def handler(event, context):
              properties = event["ResourceProperties"]
              physical_id = event.get("PhysicalResourceId") or properties["TargetLaunchTemplateId"]
              try:
                  if event["RequestType"] == "Delete":
                      return send_response(event, context, cfnresponse.SUCCESS, {}, physical_id)
                  launch_template_id, version = ensure_launch_template_version(properties)
                  send_response(
                      event,
                      context,
                      cfnresponse.SUCCESS,
                      {
                          "LaunchTemplateRef": f"{launch_template_id}:{version}",
                      },
                      launch_template_id,
                  )
              except Exception as exc:
                  send_response(
                      event,
                      context,
                      cfnresponse.FAILED,
                      {},
                      physical_id,
                      reason=str(exc),
                  )
  ManagedLaunchTemplateFunctionVersion:
    Type: AWS::Lambda::Version
    Properties:
      FunctionName: !Ref ManagedLaunchTemplateFunction

  StackConfigMaterializerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ManageStackConfigMaterializer
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:PutSecretValue
                Resource: !Ref RunsOnStackConfigSecret
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName

  StackConfigMaterializerFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.11
      Handler: index.handler
      Role: !GetAtt StackConfigMaterializerRole.Arn
      Timeout: 300
      MemorySize: 256
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName
      Code:
        ZipFile: |
          import boto3,json,hashlib
          import cfnresponse
          from botocore.exceptions import ClientError

          S=boto3.client("secretsmanager")

          def error_code(error):
              return error.response.get("Error",{}).get("Code","")

          def handler(event,context):
              p=event["ResourceProperties"];stack=p["StackConfigBase"]["StackName"];pid=f"{stack}-stack-config-materializer"
              try:
                  if event["RequestType"]=="Delete":
                      return cfnresponse.send(event,context,cfnresponse.SUCCESS,{},pid)
                  cfg=dict(p["StackConfigBase"])
                  for key in (
                      "LaunchTemplateLinuxDefault",
                      "LaunchTemplateLinuxDefaultNested",
                      "LaunchTemplateWindowsDefault",
                      "LaunchTemplateWindowsDefaultNested",
                      "LaunchTemplateLinuxPrivate",
                      "LaunchTemplateLinuxPrivateNested",
                      "LaunchTemplateWindowsPrivate",
                      "LaunchTemplateWindowsPrivateNested",
                  ):
                      cfg[key]=p[key]
                  payload=json.dumps(cfg,sort_keys=True,separators=(",",":"));vid=hashlib.sha256(payload.encode()).hexdigest()
                  try:
                      vid=S.put_secret_value(SecretId=p["StackConfigSecretArn"],SecretString=payload,ClientRequestToken=vid).get("VersionId",vid)
                  except ClientError as e:
                      if error_code(e)!="ResourceExistsException":
                          raise
                  data={"StackConfigSecretVersion":vid}
                  cfnresponse.send(event,context,cfnresponse.SUCCESS,data,pid)
              except Exception as e:
                  cfnresponse.send(event,context,cfnresponse.FAILED,{},pid,reason=str(e))

  StackConfigMaterializerFunctionVersion:
    Type: AWS::Lambda::Version
    Properties:
      FunctionName: !Ref StackConfigMaterializerFunction

  StackConfigMaterializer:
    Type: Custom::StackConfigMaterializer
    Properties:
      ServiceToken: !GetAtt StackConfigMaterializerFunction.Arn
      RefreshToken: !Ref StackConfigMaterializerFunctionVersion
      StackConfigSecretArn: !Ref RunsOnStackConfigSecret
      StackConfigBase:
        AwsAccountId: !Ref AWS::AccountId
        Private: !Ref Private
        GithubOrganization: !Ref GithubOrganization
        Region: !Ref AWS::Region
        LicenseKey: !Ref LicenseKey
        BucketConfig: !Ref S3Bucket
        BucketCache: !Ref S3BucketCache
        InstanceRoleName: !Ref EC2InstanceRole
        SshAllowed: !Ref SSHAllowed
        PublicSubnetIds: !If [ExternalVpc,
          !If [ExternalVpcPublicSubnetIdsProvided, !Join [",", !Ref ExternalVpcPublicSubnetIds], "-"],
          !Join [",", [!Ref PublicSubnet1, !Ref PublicSubnet2, !Ref PublicSubnet3]]]
        PrivateSubnetIds: !If [ExternalVpc,
          !If [ExternalVpcPrivateSubnetIdsProvided, !Join [",", !Ref ExternalVpcPrivateSubnetIds], "-"],
          !Join [",", [!Ref PrivateSubnet1, !Ref PrivateSubnet2, !Ref PrivateSubnet3]]]
        DefaultAdmins: !Ref DefaultAdmins
        TopicArn: !Ref AlertTopic
        RunnerDefaultDiskSize: !Ref RunnerDefaultDiskSize
        RunnerDefaultVolumeThroughput: !Ref RunnerDefaultVolumeThroughput
        RunnerLargeDiskSize: !Ref RunnerLargeDiskSize
        RunnerLargeVolumeThroughput: !Ref RunnerLargeVolumeThroughput
        RunnerCustomTags: !Join [",", !Ref RunnerCustomTags]
        RunnerMaxRuntime: !Ref RunnerMaxRuntime
        RunnerConfigAutoExtendsFrom: !Ref RunnerConfigAutoExtendsFrom
        EbsEncryptionKey: !If [HasEncryptEbs, "alias/aws/ebs", ""]
        AppGithubApiStrategy: !Ref AppGithubApiStrategy
        AppTag: !FindInMap [App, Tags, AppTag]
        StackName: !Ref AWS::StackName
        AppEc2QueueSize: !Ref AppEc2QueueSize
        Queue: !Ref RunsOnQueue
        QueueJobs: !Ref RunsOnQueueJobs
        QueueGithub: !Ref RunsOnQueueGithub
        QueuePool: !Ref RunsOnQueuePool
        QueueHousekeeping: !Ref RunsOnQueueHousekeeping
        QueueTermination: !Ref RunsOnQueueTermination
        QueueEvents: !Ref RunsOnQueueEvents
        LocksTable: !Ref RunsOnLocksTable
        WorkflowJobsTable: !Ref RunsOnWorkflowJobsTable
        CostReportsEnabled: !Ref CostReportsEnabled
        ServerPassword: !Ref ServerPassword
        CostAllocationTag: !Ref CostAllocationTag
        SpotCircuitBreaker: !Ref SpotCircuitBreaker
        IntegrationStepSecurityApiKey: !Ref IntegrationStepSecurityApiKey
        GithubEnterpriseUrl: !Ref GithubEnterpriseUrl
        VPCId: !If [ExternalVpc, !Ref ExternalVpcId, !Ref VPC]
        NetworkingStack: !Ref NetworkingStack
        InfrastructureSource: "cloudformation"
        Ec2InstanceLogGroupArn: !GetAtt EC2InstanceLogGroup.Arn
      LaunchTemplateLinuxDefault: !Sub "${EC2FleetLaunchTemplateLinuxDefault}:${EC2FleetLaunchTemplateLinuxDefault.LatestVersionNumber}"
      LaunchTemplateLinuxDefaultNested: !GetAtt ManagedLaunchTemplateLinuxDefaultNested.LaunchTemplateRef
      LaunchTemplateWindowsDefault: !Sub "${EC2FleetLaunchTemplateWindowsDefault}:${EC2FleetLaunchTemplateWindowsDefault.LatestVersionNumber}"
      LaunchTemplateWindowsDefaultNested: !GetAtt ManagedLaunchTemplateWindowsDefaultNested.LaunchTemplateRef
      LaunchTemplateLinuxPrivate: !GetAtt ManagedLaunchTemplateLinuxPrivate.LaunchTemplateRef
      LaunchTemplateLinuxPrivateNested: !GetAtt ManagedLaunchTemplateLinuxPrivateNested.LaunchTemplateRef
      LaunchTemplateWindowsPrivate: !GetAtt ManagedLaunchTemplateWindowsPrivate.LaunchTemplateRef
      LaunchTemplateWindowsPrivateNested: !GetAtt ManagedLaunchTemplateWindowsPrivateNested.LaunchTemplateRef

  RunsOnServiceDelayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: DescribeLaunchTemplates
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ec2:DescribeLaunchTemplateVersions
                Resource: "*"
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName

  RunsOnServiceDelayFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.11
      Handler: index.handler
      Role: !GetAtt RunsOnServiceDelayRole.Arn
      Timeout: 300
      MemorySize: 128
      VpcConfig: !If
        - PrivateEnabled
        - SecurityGroupIds: !If [ExternalVpc, [!Ref ExternalVpcSecurityGroupId], [!Ref SecurityGroup]]
          SubnetIds: !If [ExternalVpc, !Ref ExternalVpcPrivateSubnetIds, [!Ref PrivateSubnet1, !Ref PrivateSubnet2, !Ref PrivateSubnet3]]
        - !Ref "AWS::NoValue"
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName
      Code:
        ZipFile: |
          import boto3,json,logging,time
          import cfnresponse
          E=boto3.client("ec2")
          logger=logging.getLogger()
          logger.setLevel(logging.INFO)

          def handler(event,context):
              logger.info("Received event: %s", json.dumps(event))
              try:
                  p=event.get("ResourceProperties",{})
                  delay=int(p.get("DelaySeconds","0"))
                  max_wait=int(p.get("MaxWaitSeconds","0"))
                  poll=int(p.get("PollIntervalSeconds","5"))
                  ids=[v for v in p.get("LaunchTemplateIds","").split(",") if v]
                  if event["RequestType"] in ("Create","Update") and delay>0:
                      logger.info("Sleeping for %s seconds before signaling success", delay)
                      time.sleep(delay)
                  if event["RequestType"] in ("Create","Update") and max_wait>0 and ids:
                      deadline=time.monotonic()+max_wait
                      attempts=0
                      last_error=None
                      while time.monotonic()<deadline:
                          attempts+=1
                          try:
                              E.describe_launch_template_versions(LaunchTemplateId=ids[0],Versions=["$Latest"])
                              logger.info("Connectivity probe succeeded after %s attempts", attempts)
                              return cfnresponse.send(event,context,cfnresponse.SUCCESS,{})
                          except Exception as e:
                              last_error=str(e)
                              logger.warning("Connectivity probe attempt %s failed: %s", attempts, last_error)
                              time.sleep(poll)
                      raise TimeoutError(f"EC2 connectivity probe did not succeed within {max_wait}s: {last_error}")
                  cfnresponse.send(event,context,cfnresponse.SUCCESS,{})
              except Exception as e:
                  logger.exception("Delay custom resource failed")
                  cfnresponse.send(event,context,cfnresponse.FAILED,{},reason=str(e))

  # Give newly-created private networking resources a brief stabilization window
  # before App Runner rolls the service onto VPC egress.
  RunsOnServiceDelay:
    Type: Custom::RunsOnServiceDelay
    Properties:
      ServiceToken: !GetAtt RunsOnServiceDelayFunction.Arn
      DelaySeconds: !If [PrivateEnabled, 30, 0]
      MaxWaitSeconds: !If [PrivateEnabled, 180, 0]
      PollIntervalSeconds: 5
      LaunchTemplateIds: !Join
        - ","
        - - !Ref EC2FleetLaunchTemplateLinuxPrivate
          - !Ref EC2FleetLaunchTemplateWindowsPrivate
      Trigger: !If
        - HasPrivateSubnet
        - !Join
          - ","
          - - !Ref RunsOnServiceVpcConnector
            - !Ref S3VpcEndpoint
            - !Ref PrivateSubnetGateway1
            - !Ref PrivateSubnet1Route
            - !Ref PrivateSubnet2Route
            - !Ref PrivateSubnet3Route
        - !If [PrivateEnabled, !Ref RunsOnServiceVpcConnector, "public"]

