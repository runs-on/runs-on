  RunsOnPublicIngressFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: nodejs24.x
      Handler: index.handler
      Role: !GetAtt RunsOnPublicIngressRole.Arn
      Timeout: 15
      MemorySize: 256
      Environment:
        Variables:
          RUNS_ON_WEBHOOKS_QUEUE_URL: !Ref RunsOnQueueWebhooks
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName
      Code:
        ZipFile: |
          'use strict';

          const crypto = require('node:crypto');

          const WORKFLOW_JOB_GROUP_BUCKETS = 32;
          const WORKFLOW_RUN_GROUP_BUCKETS = 16;

          function createDefaultAws() {
            let initialized = false;
            let sqs;
            let SendMessageCommand;

            function init() {
              if (initialized) return;
              initialized = true;
              const sqsSdk = require('@aws-sdk/client-sqs');

              sqs = new sqsSdk.SQSClient({});
              SendMessageCommand = sqsSdk.SendMessageCommand;
            }

            return {
              async sendQueueMessage(params) {
                init();
                return sqs.send(new SendMessageCommand(params));
              },
            };
          }

          function normalizedHeaders(headers) {
            return Object.fromEntries(Object.entries(headers || {}).map(([key, value]) => [String(key).toLowerCase(), value]));
          }

          function normalizePath(path, stage) {
            const raw = String(path || '').trim() || '/';
            if (!stage) return raw;
            const stagePrefix = '/' + String(stage).replace(/^\/+|\/+$/g, '');
            if (raw === stagePrefix) return '/';
            if (raw.startsWith(stagePrefix + '/')) return raw.slice(stagePrefix.length);
            return raw;
          }

          function requestFor(event) {
            const requestContext = event.requestContext || {};
            const stage = String(requestContext.stage || '').trim();
            return {
              method: String(event.httpMethod || '').trim(),
              path: normalizePath(event.path || '/', stage),
              requestId: String(requestContext.requestId || '').trim(),
              headers: normalizedHeaders(event.headers),
              body: event.body,
              isBase64Encoded: !!event.isBase64Encoded,
            };
          }

          function payloadBuffer(request) {
            const body = String(request?.body || '');
            return request?.isBase64Encoded ? Buffer.from(body, 'base64') : Buffer.from(body, 'utf8');
          }

          function extractJobId(payload, eventType) {
            if (eventType === 'workflow_job') return Number(payload?.workflow_job?.id || 0);
            return 0;
          }

          function extractRunId(payload, eventType) {
            if (eventType === 'workflow_job') return Number(payload?.workflow_job?.run_id || 0);
            if (eventType === 'workflow_run') return Number(payload?.workflow_run?.id || 0);
            return 0;
          }

          function webhookLogFields(payload, eventType, deliveryId) {
            const fields = {
              delivery_id: deliveryId,
              event_type: eventType,
              action: String(payload?.action || '').trim(),
              repository: String(payload?.repository?.full_name || '').trim(),
            };

            if (eventType === 'workflow_job') {
              fields.job_id = Number(payload?.workflow_job?.id || 0);
              fields.run_id = Number(payload?.workflow_job?.run_id || 0);
              fields.job_name = String(payload?.workflow_job?.name || '').trim();
              fields.workflow_name = String(payload?.workflow_job?.workflow_name || '').trim();
              fields.job_url = String(payload?.workflow_job?.html_url || payload?.workflow_job?.url || '').trim();
              fields.labels = Array.isArray(payload?.workflow_job?.labels) ? payload.workflow_job.labels : [];
              return fields;
            }

            if (eventType === 'workflow_run') {
              fields.run_id = Number(payload?.workflow_run?.id || 0);
              fields.workflow_name = String(payload?.workflow_run?.name || '').trim();
              fields.run_url = String(payload?.workflow_run?.html_url || payload?.workflow_run?.url || '').trim();
              fields.status = String(payload?.workflow_run?.status || '').trim();
              fields.conclusion = String(payload?.workflow_run?.conclusion || '').trim();
            }

            return fields;
          }

          function webhookGroupId(payload, eventType, deliveryId, requestId) {
            // Keep the webhook queue FIFO so SQS still gives us delivery deduplication
            // and in-order processing within a bucket. The important ordering boundary
            // for the hot path is the individual workflow job, not the whole workflow
            // run. Large matrix runs can emit many sibling jobs at once, and grouping all
            // of them by run artificially serializes queued-job ingestion behind a single
            // FIFO lane. Grouping workflow_job events by job ID keeps queued -> waiting ->
            // queued -> in_progress -> completed ordered for one job while letting other
            // jobs from the same run advance in parallel.
            const jobId = extractJobId(payload, eventType);
            if (jobId > 0) return 'job-' + String(jobId % WORKFLOW_JOB_GROUP_BUCKETS);

            // workflow_run events are not the hot path that triggers scheduling, so keep
            // them grouped at run granularity. That preserves a stable ordering model for
            // run-level metadata updates without coupling workflow_job throughput to it.
            const runId = extractRunId(payload, eventType);
            if (runId > 0) return 'run-' + String(runId % WORKFLOW_RUN_GROUP_BUCKETS);

            // Installation and malformed payloads do not have stable job/run identity.
            // Hash the delivery/request identity into a bounded fallback bucket so we
            // still satisfy FIFO queue requirements without creating unbounded group IDs.
            const fallback = String(deliveryId || requestId || 'fallback').trim();
            const digest = crypto.createHash('sha256').update(fallback).digest('hex');
            return 'delivery-' + digest.slice(0, 8);
          }

          function log(level, message, fields = {}) {
            const entry = {
              level,
              message,
              ...fields,
            };
            const rendered = JSON.stringify(entry);
            if (level === 'error') {
              console.error(rendered);
              return;
            }
            if (level === 'warn') {
              console.warn(rendered);
              return;
            }
            console.log(rendered);
          }

          function jsonResponse(statusCode, body) {
            return {
              statusCode,
              headers: { 'content-type': 'application/json' },
              body: JSON.stringify(body),
            };
          }

          function methodNotAllowed(allowedMethods) {
            return {
              statusCode: 405,
              headers: {
                'content-type': 'application/json',
                allow: allowedMethods.join(', '),
              },
              body: JSON.stringify({ error: 'method not allowed' }),
            };
          }

          function createHandler(options = {}) {
            const aws = options.aws || createDefaultAws();

            async function enqueueWebhook(request) {
              const headers = request.headers;
              const deliveryId = String(headers['x-github-delivery'] || '').trim();
              const eventType = String(headers['x-github-event'] || '').trim();
              const provided = String(headers['x-hub-signature-256'] || '').trim();
              const payload = payloadBuffer(request).toString('utf8');

              let parsedBody;
              try {
                parsedBody = JSON.parse(payload);
              } catch (_) {
                parsedBody = null;
              }

              const logFields = webhookLogFields(parsedBody, eventType, deliveryId);
              log('info', 'Received GitHub webhook', logFields);
              const groupId = webhookGroupId(parsedBody, eventType, deliveryId, request.requestId);
              // Keep deduplication tied to the GitHub delivery so a retried webhook does
              // not get re-enqueued, even though different lifecycle events for the same
              // job are intentionally free to land in the same FIFO job bucket.
              const deduplicationId = String(deliveryId || request.requestId || groupId).trim();
              log('info', 'Queueing GitHub webhook', {
                message_group_id: groupId,
                ...logFields,
              });
              await aws.sendQueueMessage({
                QueueUrl: process.env.RUNS_ON_WEBHOOKS_QUEUE_URL,
                MessageBody: JSON.stringify({
                  event_type: eventType,
                  delivery_id: deliveryId,
                  signature_256: provided,
                  payload,
                }),
                MessageDeduplicationId: deduplicationId,
                MessageGroupId: groupId,
              });
              log('info', 'Queued GitHub webhook', {
                message_group_id: groupId,
                ...logFields,
              });
              return jsonResponse(202, { status: 'accepted' });
            }

            return async function handler(event) {
              const request = requestFor(event);
              const method = request.method;
              const path = request.path;
              const requestId = request.requestId;

              log('info', 'Public ingress request received', {
                request_id: requestId,
                method,
                path,
              });

              try {
                let response;
                if (path === '/github/webhooks') {
                  response = method === 'POST' ? await enqueueWebhook(request) : methodNotAllowed(['POST']);
                } else {
                  response = jsonResponse(404, { error: 'not found' });
                }

                log('info', 'Public ingress request completed', {
                  request_id: requestId,
                  method,
                  path,
                  status_code: response.statusCode,
                });
                return response;
              } catch (error) {
                log('error', 'Public ingress request failed', {
                  request_id: requestId,
                  method,
                  path,
                  error: String(error?.message || error),
                });
                return jsonResponse(500, { error: 'internal server error' });
              }
            };
          }

          module.exports = {
            createHandler,
            handler: createHandler(),
          };
  RunsOnGitHubAppsSetupFunction:
    Condition: AdminRoutesEnabled
    Type: AWS::Lambda::Function
    Properties:
      Runtime: nodejs24.x
      Handler: index.handler
      Role: !GetAtt RunsOnGitHubAppsSetupRole.Arn
      Timeout: 15
      MemorySize: 256
      Environment:
        Variables:
          RUNS_ON_GITHUB_ORG: !Ref GithubOrganization
          RUNS_ON_GITHUB_APPS_SECRET_ARN: !Ref RunsOnGitHubAppsSecret
          RUNS_ON_STACK_CONFIG_SECRET_ARN: !Ref RunsOnStackConfigSecret
          RUNS_ON_STACK_CONFIG_SECRET_VERSION: !GetAtt StackConfigMaterializer.StackConfigSecretVersion
          RUNS_ON_LICENSE_STATUS_SSM_PARAMETER: !Ref RunsOnLicenseStatusParameter
          RUNS_ON_APP_TAG: !FindInMap [App, Tags, AppTag]
          RUNS_ON_PUBLIC_BASE_URL: !Sub "https://${RunsOnPublicIngressRestApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
          RUNS_ON_TOPIC_ARN: !Ref AlertTopic
          RUNS_ON_SYSTEM_QUEUE_URL: !Ref RunsOnQueueSystem
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName
      Code:
        ZipFile: |
          'use strict';

          const crypto = require('node:crypto');

          const SETUP_STATE_MAX_AGE_SECONDS = 30 * 60;

          function createDefaultAws() {
            let initialized = false;
            let secrets;
            let sqs;
            let sns;
            let iam;
            let ssm;
            let GetSecretValueCommand;
            let PutSecretValueCommand;
            let SendMessageCommand;
            let ListSubscriptionsByTopicCommand;
            let GetRoleCommand;
            let CreateServiceLinkedRoleCommand;
            let GetParameterCommand;

            function init() {
              if (initialized) return;
              initialized = true;
              const secretsSdk = require('@aws-sdk/client-secrets-manager');
              const sqsSdk = require('@aws-sdk/client-sqs');
              const snsSdk = require('@aws-sdk/client-sns');
              const iamSdk = require('@aws-sdk/client-iam');
              const ssmSdk = require('@aws-sdk/client-ssm');

              secrets = new secretsSdk.SecretsManagerClient({});
              sqs = new sqsSdk.SQSClient({});
              sns = new snsSdk.SNSClient({});
              iam = new iamSdk.IAMClient({});
              ssm = new ssmSdk.SSMClient({});
              GetSecretValueCommand = secretsSdk.GetSecretValueCommand;
              PutSecretValueCommand = secretsSdk.PutSecretValueCommand;
              SendMessageCommand = sqsSdk.SendMessageCommand;
              ListSubscriptionsByTopicCommand = snsSdk.ListSubscriptionsByTopicCommand;
              GetRoleCommand = iamSdk.GetRoleCommand;
              CreateServiceLinkedRoleCommand = iamSdk.CreateServiceLinkedRoleCommand;
              GetParameterCommand = ssmSdk.GetParameterCommand;
            }

            return {
              async getSecret(params) {
                init();
                return secrets.send(new GetSecretValueCommand(params));
              },
              async putSecret(params) {
                init();
                return secrets.send(new PutSecretValueCommand(params));
              },
              async sendQueueMessage(params) {
                init();
                return sqs.send(new SendMessageCommand(params));
              },
              async listSubscriptionsByTopic(params) {
                init();
                return sns.send(new ListSubscriptionsByTopicCommand(params));
              },
              async getRole(params) {
                init();
                return iam.send(new GetRoleCommand(params));
              },
              async createServiceLinkedRole(params) {
                init();
                return iam.send(new CreateServiceLinkedRoleCommand(params));
              },
              async getParameter(params) {
                init();
                return ssm.send(new GetParameterCommand(params));
              },
            };
          }

          function githubBaseUrl() {
            const enterprise = String(process.env.RUNS_ON_GITHUB_ENTERPRISE_URL || '').trim();
            return enterprise ? enterprise.replace(/\/+$/, '') + '/' : 'https://github.com/';
          }

          function githubApiUrl() {
            const enterprise = String(process.env.RUNS_ON_GITHUB_ENTERPRISE_URL || '').trim();
            return enterprise ? enterprise.replace(/\/+$/, '') + '/api/v3/' : 'https://api.github.com/';
          }

          function normalizedHeaders(headers) {
            return Object.fromEntries(Object.entries(headers || {}).map(([key, value]) => [String(key).toLowerCase(), value]));
          }

          function normalizePath(path, stage) {
            const raw = String(path || '').trim() || '/';
            if (!stage) return raw;
            const stagePrefix = '/' + String(stage).replace(/^\/+|\/+$/g, '');
            if (raw === stagePrefix) return '/';
            if (raw.startsWith(stagePrefix + '/')) return raw.slice(stagePrefix.length);
            return raw;
          }

          function requestFor(event) {
            const requestContext = event.requestContext || {};
            const stage = String(requestContext.stage || '').trim();
            return {
              method: String(event.httpMethod || '').trim(),
              path: normalizePath(event.path || '/', stage),
              requestId: String(requestContext.requestId || '').trim(),
              headers: normalizedHeaders(event.headers),
              queryStringParameters: event.queryStringParameters || {},
            };
          }

          function baseUrl() {
            const configured = String(process.env.RUNS_ON_PUBLIC_BASE_URL || '').trim();
            if (!configured) throw new Error('RUNS_ON_PUBLIC_BASE_URL is required');
            return configured.replace(/\/+$/, '');
          }

          function log(level, message, fields = {}) {
            const entry = {
              level,
              message,
              ...fields,
            };
            const rendered = JSON.stringify(entry);
            if (level === 'error') {
              console.error(rendered);
              return;
            }
            if (level === 'warn') {
              console.warn(rendered);
              return;
            }
            console.log(rendered);
          }

          function jsonResponse(statusCode, body) {
            return {
              statusCode,
              headers: { 'content-type': 'application/json' },
              body: JSON.stringify(body),
            };
          }

          function methodNotAllowed(allowedMethods) {
            return {
              statusCode: 405,
              headers: {
                'content-type': 'application/json',
                allow: allowedMethods.join(', '),
              },
              body: JSON.stringify({ error: 'method not allowed' }),
            };
          }

          function htmlResponse(body, statusCode = 200) {
            return {
              statusCode,
              headers: { 'content-type': 'text/html; charset=utf-8' },
              body,
            };
          }

          function redirect(location) {
            let target = String(location || '').trim();
            if (!/^https?:\/\//.test(target)) {
              target = appUrl(target);
            }
            return { statusCode: 302, headers: { location: target }, body: '' };
          }

          function appUrl(path) {
            const raw = String(path || '').trim();
            const normalized = raw.startsWith('/') ? raw : '/' + raw;
            const configured = String(process.env.RUNS_ON_PUBLIC_BASE_URL || '').trim();
            if (configured) {
              return configured.replace(/\/+$/, '') + normalized;
            }
            return normalized;
          }

          function base64UrlEncode(value) {
            return Buffer.from(value).toString('base64url');
          }

          function base64UrlDecode(value) {
            return Buffer.from(String(value || ''), 'base64url').toString('utf8');
          }

          function timingSafeEqualString(left, right) {
            const leftBuffer = Buffer.from(String(left || ''));
            const rightBuffer = Buffer.from(String(right || ''));
            if (leftBuffer.length !== rightBuffer.length) return false;
            return crypto.timingSafeEqual(leftBuffer, rightBuffer);
          }

          function setupStateSigningKey(licenseKey) {
            const rawLicenseKey = String(licenseKey || '').trim();
            if (!rawLicenseKey) {
              throw new Error('stack config LicenseKey is required for setup state signing');
            }
            return crypto
              .createHmac('sha256', rawLicenseKey)
              .update('runs-on setup state')
              .update('\0')
              .update(configuredGitHubOrg())
              .update('\0')
              .update(baseUrl())
              .digest();
          }

          function signSetupState(payload, licenseKey) {
            const encodedPayload = base64UrlEncode(JSON.stringify(payload));
            const signature = crypto
              .createHmac('sha256', setupStateSigningKey(licenseKey))
              .update(encodedPayload)
              .digest('base64url');
            return `${encodedPayload}.${signature}`;
          }

          function setupStatePayload(kind, idFactory, now, extra = {}) {
            return {
              v: 1,
              kind,
              org: configuredGitHubOrg(),
              base_url: baseUrl(),
              iat: Math.floor(now() / 1000),
              nonce: idFactory(),
              ...extra,
            };
          }

          function createSetupState(kind, licenseKey, idFactory, now, extra = {}) {
            return signSetupState(setupStatePayload(kind, idFactory, now, extra), licenseKey);
          }

          function verifySetupState(token, expectedKind, licenseKey, now, expected = {}) {
            const rawToken = String(token || '').trim();
            if (!rawToken) return { ok: false, message: 'The setup callback is missing its signed state.' };

            const parts = rawToken.split('.');
            if (parts.length !== 2 || !parts[0] || !parts[1]) {
              return { ok: false, message: 'The setup callback state is malformed.' };
            }

            const expectedSignature = crypto
              .createHmac('sha256', setupStateSigningKey(licenseKey))
              .update(parts[0])
              .digest('base64url');
            if (!timingSafeEqualString(parts[1], expectedSignature)) {
              return { ok: false, message: 'The setup callback state signature is invalid.' };
            }

            let payload;
            try {
              payload = JSON.parse(base64UrlDecode(parts[0]));
            } catch (_) {
              return { ok: false, message: 'The setup callback state payload is invalid.' };
            }

            const issuedAt = Number(payload?.iat || 0);
            const nowSeconds = Math.floor(now() / 1000);
            if (!Number.isFinite(issuedAt) || issuedAt <= 0 || nowSeconds - issuedAt > SETUP_STATE_MAX_AGE_SECONDS || issuedAt - nowSeconds > 60) {
              return { ok: false, message: 'The setup callback state has expired.' };
            }
            if (payload?.v !== 1 || payload?.kind !== expectedKind) {
              return { ok: false, message: 'The setup callback state does not match this setup flow.' };
            }
            if (!stringsEqualFold(payload?.org, configuredGitHubOrg()) || payload?.base_url !== baseUrl()) {
              return { ok: false, message: 'The setup callback state does not match this RunsOn stack.' };
            }
            if (expected.primaryAppId && String(payload?.primary_app_id || '') !== String(expected.primaryAppId)) {
              return { ok: false, message: 'The setup callback state does not match the current primary GitHub App.' };
            }

            return { ok: true, payload };
          }

          function stringsEqualFold(left, right) {
            return String(left || '').toLowerCase() === String(right || '').toLowerCase();
          }

          function escapeHtml(value) {
            return String(value || '')
              .replaceAll('&', '&amp;')
              .replaceAll('<', '&lt;')
              .replaceAll('>', '&gt;')
              .replaceAll('"', '&quot;')
              .replaceAll("'", '&#39;');
          }

          function pageCss() {
            return `:root{color-scheme:light;--page-bg:#11111b;--page-bg-accent:#11111b;--panel:#fff;--panel-muted:#f8fafc;--line:#e5e7eb;--line-strong:#23272f;--text:#111827;--muted:#4b5563;--accent:#7540bf;--accent-hover:#5a2d99;--accent-soft:#f5f0ff;--brand:#eab308;--brand-soft:#fefce8;--brand-muted:rgba(234,179,8,.18);--healthy:#166534;--healthy-soft:#ecfdf5;--warning:#92400e;--warning-soft:#fffbeb;--error:#b91c1c;--error-soft:#fef2f2}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(180deg,var(--page-bg) 0%,var(--page-bg-accent) 24%,#eef2f7 24%,#eef2f7 100%);color:var(--text)}a{color:var(--accent);text-decoration:underline;text-decoration-color:rgba(117,64,191,.4);text-underline-offset:0.18em}a:hover{text-decoration-color:var(--accent)}.page{max-width:980px;margin:0 auto;padding:28px 20px 56px}.top-bar{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;padding:0 0 24px;border-bottom:1px solid rgba(255,255,255,.14)}.top-bar-brand{display:flex;align-items:center;gap:12px;text-decoration:none}.top-bar-brand:hover{text-decoration:none}.logo{width:48px;height:48px;display:block;filter:drop-shadow(0 0 8px rgba(234,179,8,.3))}.brand-name{margin:0;font-size:18px;font-weight:800;letter-spacing:-0.01em;color:#fff}.nav-bar{display:flex;flex-wrap:wrap;gap:18px}.nav-link{display:inline-flex;align-items:center;padding:10px 0 8px;border-bottom:2px solid transparent;font-size:14px;font-weight:600;color:#8b92a1;text-decoration:none;transition:border-color .15s,color .15s}.nav-link:hover{color:#e2e5eb;text-decoration:none}.nav-link.nav-active{border-bottom-color:#c9afe4;color:#c9afe4}.card{background:var(--panel);border:1px solid var(--line-strong);padding:36px 34px 32px}.title{margin:0 0 12px;font-size:38px;line-height:1.02;letter-spacing:-0.04em}.lead{max-width:720px;margin:0 0 24px;font-size:17px;line-height:1.7;color:var(--muted)}.setup-copy{max-width:760px;margin:0 0 18px;font-size:16px;line-height:1.7;color:var(--muted)}.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:20px}.button,.icon-button{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--accent);background:var(--accent);color:#fff;font:inherit;font-weight:700;cursor:pointer;text-decoration:none;transition:background .15s,color .15s,border-color .15s,box-shadow .15s}.button{min-height:44px;padding:0 16px}.button:hover,.icon-button:hover{background:var(--accent-hover);border-color:var(--accent-hover);color:#fff;text-decoration:none}.button.secondary,.button.ghost,.icon-button.secondary{background:#fff;color:var(--accent);border-color:#d7caef}.button.secondary:hover,.button.ghost:hover,.icon-button.secondary:hover{background:var(--accent-soft);border-color:var(--accent)}.button.cta{min-height:50px;padding:0 28px;font-size:16px;box-shadow:0 2px 12px rgba(117,64,191,.25);letter-spacing:.01em}.button.cta:hover{box-shadow:0 4px 20px rgba(117,64,191,.35)}.private-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:6px;background:rgba(234,179,8,.08);border:1px solid rgba(234,179,8,.22);color:#92700e;font-size:13px;font-weight:600;margin-bottom:6px}.private-badge::before{content:'';display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--brand);flex:0 0 auto}.section{margin-top:30px;padding-top:22px;border-top:1px solid var(--line)}.section-header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:0 0 14px}.section h2,.section-header h2{margin:0 0 14px;font-size:20px;font-weight:700;letter-spacing:0;color:var(--text)}.section-header h2{margin:0}.icon-button{width:40px;height:40px;padding:0;font-size:18px;line-height:1}.app-list{display:grid;gap:10px}.app-card{padding:16px 20px;border:1px solid var(--line);border-left:3px solid var(--brand-muted);background:var(--panel-muted);transition:border-left-color .15s}.app-card:hover{border-left-color:var(--brand)}.app-row{display:flex;align-items:center;gap:16px;justify-content:space-between}.app-identity{flex:1;min-width:0}.app-header{display:flex;align-items:center;gap:8px;margin:0 0 4px;flex-wrap:wrap}.app-name{margin:0;font-size:15px;font-weight:700;letter-spacing:-0.02em}.app-url{font-size:12px;color:var(--muted);text-decoration:none;display:block;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.app-url:hover{color:var(--accent);text-decoration:none}.app-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700;flex-shrink:0}.app-tag::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;flex:0 0 auto}.app-tag.healthy{background:var(--healthy-soft);color:var(--healthy)}.app-tag.healthy::before{background:#22c55e}.app-tag.warning{background:var(--warning-soft);color:var(--warning)}.app-tag.warning::before{background:#f59e0b}.app-tag.error{background:var(--error-soft);color:var(--error)}.app-tag.error::before{background:#ef4444}.app-actions{flex-shrink:0;display:flex;flex-wrap:wrap;gap:8px}.app-actions .button{white-space:nowrap}.section-desc{margin:0 0 14px;font-size:14px;color:var(--muted);line-height:1.6}.app-meta{margin:0;color:var(--muted);font-size:13px;line-height:1.5}.code{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;background:#eef2f7;padding:2px 6px}.muted{color:var(--muted)}.status-badge{display:inline-flex;align-items:center;gap:7px;padding:5px 12px 5px 10px;border-radius:6px;font-size:13px;font-weight:700;letter-spacing:.01em;margin-bottom:18px}.status-badge::before{content:'';display:inline-block;width:8px;height:8px;border-radius:50%;flex:0 0 auto}.status-badge.healthy{background:var(--healthy-soft);color:var(--healthy);border:1px solid rgba(22,101,52,.12)}.status-badge.healthy::before{background:#22c55e}.status-badge.warning{background:var(--warning-soft);color:var(--warning);border:1px solid rgba(146,64,14,.12)}.status-badge.warning::before{background:#f59e0b}.status-badge.error{background:var(--error-soft);color:var(--error);border:1px solid rgba(185,28,28,.12)}.status-badge.error::before{background:#ef4444}.resource-list{margin:0;padding:0;list-style:none;display:grid;gap:2px}.resource-link{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:8px;font-size:14px;font-weight:500;color:var(--text);text-decoration:none;border:1px solid transparent;transition:background .12s,border-color .12s,color .12s}.resource-link:hover{background:var(--accent-soft);border-color:#ddd0f7;color:var(--accent);text-decoration:none}.resource-arrow{color:var(--accent);opacity:.5;font-size:14px;transition:opacity .12s}.resource-link:hover .resource-arrow{opacity:1}.notice{margin:24px 0 0;padding:11px 16px;border-left:3px solid var(--accent);background:var(--accent-soft);font-size:13px;color:#5a3d8a;line-height:1.6}.health{margin-top:30px}.health-grid{display:grid;gap:12px}.health-item{display:grid;grid-template-columns:12px minmax(0,1fr);gap:14px;align-items:flex-start;padding:16px 18px;border:1px solid var(--line);border-left-width:4px;background:var(--panel-muted);transition:border-left-color .15s}.health-dot{width:10px;height:10px;margin-top:5px;background:#9ca3af;flex:0 0 auto}.health-item.healthy{border-left-color:#22c55e;background:var(--healthy-soft)}.health-item.healthy .health-dot{background:#22c55e}.health-item.warning{border-left-color:#f59e0b;background:var(--warning-soft)}.health-item.warning .health-dot{background:#f59e0b}.health-item.error{border-left-color:#ef4444;background:var(--error-soft)}.health-item.error .health-dot{background:#ef4444}.health-name{margin:0 0 4px;font-size:15px;font-weight:800;letter-spacing:-0.02em}.health-message,.health-hint{margin:0;font-size:14px;line-height:1.6;color:#6b7280}.health-hint{margin-top:6px}@media (max-width:640px){body{background:linear-gradient(180deg,var(--page-bg) 0%,var(--page-bg-accent) 18%,#eef2f7 18%,#eef2f7 100%)}.page{padding:18px 14px 40px}.top-bar{flex-direction:column;align-items:flex-start;padding-bottom:18px}.nav-bar{gap:14px}.card{padding:26px 22px 24px}.title{font-size:30px}.lead,.setup-copy{font-size:16px}.section-header{align-items:center}.app-row{flex-direction:column;align-items:flex-start}.app-actions{width:100%}.app-actions .button{flex:1 1 auto;text-align:center;justify-content:center}}`;
          }

          function toneForStatus(status) {
            if (status === 'ready' || status === 'healthy') return 'healthy';
            if (status === 'error') return 'error';
            return 'warning';
          }

          function renderNav(activePath) {
            if (!activePath) return '';
            const items = [
              { label: 'Apps', path: '/setup/apps' },
              { label: 'Status', path: '/setup/success' },
            ];
            const links = items.map((item) => {
              const active = item.path === activePath ? ' nav-active' : '';
              return `<a class="nav-link${active}" href="${escapeHtml(appUrl(item.path))}">${escapeHtml(item.label)}</a>`;
            }).join('');
            return `<nav class="nav-bar">${links}</nav>`;
          }

          function renderDocument(title, lead, body, activePath, preTitle) {
            const nav = renderNav(activePath);
            const preTitleHtml = preTitle || '';
            const notice = `<p class="notice">These setup pages can be disabled by setting the <span class="code">EnableAdminRoutes</span> stack parameter to <span class="code">false</span>.</p>`;
            return `<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>${escapeHtml(title)}</title><style>${pageCss()}</style></head><body><main class="page"><header class="top-bar"><a class="top-bar-brand" href="${escapeHtml(appUrl('/setup/apps'))}"><img class="logo" src="https://runs-on.com/logo.png" alt="RunsOn logo"></a>${nav}</header><section class="card">${preTitleHtml}<h1 class="title">${escapeHtml(title)}</h1><p class="lead">${escapeHtml(lead)}</p>${body}${notice}</section></main></body></html>`;
          }

          function renderPage(title, lead, body, statusCode = 200, activePath = null, preTitle = '') {
            return htmlResponse(renderDocument(title, lead, body, activePath, preTitle), statusCode);
          }

          function configuredGitHubOrg() {
            return String(process.env.RUNS_ON_GITHUB_ORG || '').trim();
          }

          function appSlugFromConfig(appConfig) {
            const explicit = String(appConfig?.slug || '').trim();
            if (explicit) return explicit;

            const rawUrl = String(appConfig?.html_url || '').trim();
            if (!rawUrl) return '';

            try {
              const pathname = new URL(rawUrl).pathname.replace(/\/+$/, '');
              const match = pathname.match(/\/apps\/([^/]+)$/) || pathname.match(/\/settings\/apps\/([^/]+)$/);
              return match ? decodeURIComponent(match[1]) : '';
            } catch (_) {
              return '';
            }
          }

          function appPublicUrl(appConfig) {
            const rawUrl = String(appConfig?.html_url || '').trim();
            if (rawUrl) return rawUrl;

            const slug = appSlugFromConfig(appConfig);
            return slug ? githubBaseUrl() + 'apps/' + encodeURIComponent(slug) : '';
          }

          function appSettingsUrl(appConfig) {
            const slug = appSlugFromConfig(appConfig);
            if (!slug) return '';

            const org = configuredGitHubOrg();
            const ownerPath = org
              ? 'organizations/' + encodeURIComponent(org) + '/settings/apps/'
              : 'settings/apps/';
            return githubBaseUrl() + ownerPath + encodeURIComponent(slug);
          }

          function appInstallationUrl(appConfig) {
            const settingsUrl = appSettingsUrl(appConfig);
            if (settingsUrl) {
              return settingsUrl.replace(/\/+$/, '') + '/installations';
            }

            const publicUrl = appPublicUrl(appConfig);
            return publicUrl ? publicUrl.replace(/\/+$/, '') + '/installations/new' : '';
          }

          function appNewInstallationUrl(appConfig) {
            const publicUrl = appPublicUrl(appConfig);
            return publicUrl ? publicUrl.replace(/\/+$/, '') + '/installations/new' : '';
          }

          function manifestForPrimary() {
            const url = baseUrl();
            return {
              default_events: ['workflow_run', 'workflow_job', 'meta'],
              default_permissions: {
                administration: 'write',
                single_file: 'write',
                metadata: 'read',
                members: 'read',
                actions: 'write',
                deployments: 'read',
              },
              single_file_paths: ['.github/runs-on.yml'],
              description: 'Deploy ephemeral and cheap self-hosted runners for your GitHub Actions workflows, in your AWS account',
              hook_attributes: { url: url + '/github/webhooks' },
              name: `RunsOn [${process.env.RUNS_ON_GITHUB_ORG}]`,
              public: false,
              redirect_url: url + '/setup/convert',
              setup_url: url + '/setup/success',
              setup_on_update: true,
              url: 'https://runs-on.com',
              version: 'v1',
            };
          }

          function manifestForBoost(idFactory) {
            const url = baseUrl();
            const suffix = String(idFactory()).replaceAll('-', '').slice(0, 8);
            return {
              default_permissions: {
                administration: 'write',
              },
              description: 'API-only RunsOn GitHub App for same-organization rate-limit expansion',
              name: `RunsOn API Boost [${process.env.RUNS_ON_GITHUB_ORG}] ${suffix}`,
              public: false,
              redirect_url: url + '/setup/apps/convert',
              setup_url: url + '/setup/apps',
              url: 'https://runs-on.com',
              version: 'v1',
            };
          }

          function buildPendingPersistedGitHubApps(appConfig, existingPersisted = null) {
            return {
              primary: {
                app_config: appConfig,
              },
              boosts: existingPersisted?.boosts && typeof existingPersisted.boosts === 'object' ? existingPersisted.boosts : {},
            };
          }

          function clonePersisted(persisted) {
            if (!persisted || typeof persisted !== 'object') return {};
            return JSON.parse(JSON.stringify(persisted));
          }

          function boostAppConfigForPersistence(appConfig) {
            const persisted = { ...appConfig };
            delete persisted.webhook_secret;
            delete persisted.webhookSecret;
            return persisted;
          }

          function stateForPersisted(persisted) {
            const primary = persisted?.primary || {};
            const appConfig = primary?.app_config || {};
            const state = {
              persisted: persisted && typeof persisted === 'object' ? persisted : null,
              hasPrimaryApp: !!appConfig?.id,
              appId: appConfig?.id ? String(appConfig.id) : '',
              appName: String(appConfig?.name || '').trim(),
              appUrl: appPublicUrl(appConfig),
              appHref: '',
              installationUrl: '',
              installationsUrl: '',
            };
            state.appHref = appSettingsUrl(appConfig) || state.appUrl;
            state.installationUrl = appNewInstallationUrl(appConfig);
            state.installationsUrl = appInstallationUrl(appConfig);
            return state;
          }

          function readyConfigFromStackConfig(config) {
            return {
              private: String(config?.Private || '').trim(),
            };
          }

          function renderSetupPage(licenseKey, idFactory, now) {
            const setupState = createSetupState('primary', licenseKey, idFactory, now);
            const manifest = manifestForPrimary();
            const action = githubBaseUrl() + 'organizations/' + process.env.RUNS_ON_GITHUB_ORG + '/settings/apps/new';
            return renderPage(
              'Welcome to RunsOn',
              'You are just a few clicks away from fast, secure, self-hosted GitHub runners at the best price possible.',
              `<p class="setup-copy">Create and install a private GitHub App in your organization so this RunsOn stack can receive workflow webhooks and manage self-hosted runners for your jobs.</p><p class="setup-copy">This GitHub App stays private to your organization. RunsOn uses it only to get the permissions needed to launch and manage runners for your workflows.</p><div class="private-badge">Private to your organization</div><form action="${escapeHtml(action)}" method="post"><input type="hidden" name="manifest" value="${escapeHtml(JSON.stringify(manifest))}"><input type="hidden" name="state" value="${escapeHtml(setupState)}"><div class="actions"><button class="button cta" type="submit">Register GitHub App</button></div></form><p class="setup-copy">Note: RunsOn is not affiliated with GitHub.</p>${renderResources()}`,
            );
          }

          function renderHealthIndicators(indicators) {
            if (!Array.isArray(indicators) || indicators.length === 0) return '';
            const header = `<div class="section-header"><h2>Health checks</h2><button class="icon-button secondary" type="button" title="Refresh health checks" aria-label="Refresh health checks" onclick="window.location.reload()">&#8635;</button></div>`;
            const items = indicators.map((indicator) => {
              const tone = toneForStatus(indicator.status);
              const hint = indicator.hint ? `<p class="health-hint">${escapeHtml(indicator.hint)}</p>` : '';
              const link = indicator.url ? `<p class="health-hint"><a href="${escapeHtml(indicator.url)}">Learn more</a></p>` : '';
              return `<article class="health-item ${escapeHtml(tone)}"><div class="health-dot"></div><div><p class="health-name">${escapeHtml(indicator.name)}</p><p class="health-message">${escapeHtml(indicator.message)}</p>${hint}${link}</div></article>`;
            }).join('');
            return `<section class="health section">${header}<div class="health-grid">${items}</div></section>`;
          }

          function renderResources() {
            const links = [
              { href: 'https://runs-on.com/docs/', label: 'Documentation' },
              { href: 'https://github.com/runs-on/runs-on', label: 'GitHub project' },
              { href: 'https://github.com/runs-on/runs-on/releases', label: 'Latest releases' },
              { href: 'https://runs-on.com/pricing/', label: 'Pricing &amp; license' },
            ];
            const items = links.map(({ href, label }) => `<li><a class="resource-link" href="${escapeHtml(href)}">${label}<span class="resource-arrow">&#8594;</span></a></li>`).join('');
            return `<section class="section"><div class="section-header"><h2>Resources</h2></div><ul class="resource-list">${items}</ul></section>`;
          }

          function renderSetupSuccessPage(state, indicators) {
            const title = state.hasPrimaryApp ? 'RunsOn setup complete' : 'RunsOn setup';
            const summary = state.hasPrimaryApp
              ? 'GitHub App configuration is stored for this stack.'
              : 'GitHub App setup is still in progress.';

            let preTitle = '';
            if (state.hasPrimaryApp && Array.isArray(indicators) && indicators.length > 0) {
              const allHealthy = indicators.every((i) => toneForStatus(i.status) === 'healthy');
              const hasError = indicators.some((i) => toneForStatus(i.status) === 'error');
              const tone = allHealthy ? 'healthy' : hasError ? 'error' : 'warning';
              const label = allHealthy ? 'All checks passed' : hasError ? 'Issues detected' : 'Attention needed';
              preTitle = `<div class="status-badge ${escapeHtml(tone)}">${escapeHtml(label)}</div>`;
            }

            return renderPage(title, summary, `${renderHealthIndicators(indicators)}${renderResources()}`, 200, '/setup/success', preTitle);
          }

          function boostEntries(persisted) {
            const boosts = persisted?.boosts && typeof persisted.boosts === 'object' ? persisted.boosts : {};
            return Object.entries(boosts)
              .sort(([a], [b]) => a.localeCompare(b))
              .map(([appKey, boost]) => {
                const appConfig = boost?.app_config || {};
                return {
                  appKey,
                  appUrl: appPublicUrl(appConfig),
                  appHref: appSettingsUrl(appConfig) || appPublicUrl(appConfig),
                  installationUrl: appInstallationUrl(appConfig),
                  label: String(boost?.github_app_label || appConfig?.slug || appConfig?.name || appKey).trim() || appKey,
                };
              });
          }

          function renderAppCard(name, appHref, meta, actions, tag) {
            const tagHtml = tag ? `<span class="app-tag ${escapeHtml(tag.tone)}">${escapeHtml(tag.label)}</span>` : '';
            const urlHtml = appHref ? `<a class="app-url" href="${escapeHtml(appHref)}">${escapeHtml(appHref.replace('https://', ''))}</a>` : '';
            const metaHtml = meta ? `<p class="app-meta">${meta}</p>` : '';
            const actionsHtml = actions.length > 0 ? `<div class="app-actions">${actions.join('')}</div>` : '';
            return `<div class="app-card"><div class="app-row"><div class="app-identity"><div class="app-header"><span class="app-name">${escapeHtml(name)}</span>${tagHtml}</div>${urlHtml}${metaHtml}</div>${actionsHtml}</div></div>`;
          }

          function renderAppsPage(state, idFactory, licenseKey, now) {
            const action = githubBaseUrl() + 'organizations/' + process.env.RUNS_ON_GITHUB_ORG + '/settings/apps/new';
            const setupState = createSetupState('boost', licenseKey, idFactory, now, { primary_app_id: state.appId });
            const boostManifest = manifestForBoost(idFactory);

            const primaryActions = [];
            if (state.installationsUrl) {
              primaryActions.push(`<a class="button ghost" href="${escapeHtml(state.installationsUrl)}">Open Installations</a>`);
            }
            const primaryCard = renderAppCard(
              state.appName || 'Primary GitHub App',
              state.appHref,
              'Manages workflow webhook intake for this stack.',
              primaryActions,
              { tone: 'healthy', label: 'Connected' },
            );

            const boosts = boostEntries(state.persisted);
            const boostCards = boosts.length === 0
              ? '<p class="muted">No API boost apps configured yet.</p>'
              : `<div class="app-list">${boosts.map((boost) => {
                const boostActions = boost.installationUrl
                  ? [`<a class="button secondary" href="${escapeHtml(boost.installationUrl)}">Open Installations</a>`]
                  : [];
                return renderAppCard(
                  boost.label,
                  boost.appHref,
                  `app key: <span class="code">${escapeHtml(boost.appKey)}</span>`,
                  boostActions,
                  { tone: 'healthy', label: 'Connected' },
                );
              }).join('')}</div>`;

            return renderPage(
              'GitHub apps',
              'Manage the control-plane GitHub App and add same-organization API boost apps.',
              `<section class="section"><h2>Primary app</h2>${primaryCard}</section><section class="section"><h2>API boost apps</h2><p class="section-desc">Only add extra GitHub Apps to this organization after your logs show GitHub rate-limit issues while RunsOn is generating runner JIT tokens.</p>${boostCards}<form action="${escapeHtml(action)}" method="post"><input type="hidden" name="manifest" value="${escapeHtml(JSON.stringify(boostManifest))}"><input type="hidden" name="state" value="${escapeHtml(setupState)}"><div class="actions" style="margin-top:20px"><button class="button" type="submit">Add Boost App</button></div></form></section>`,
              200,
              '/setup/apps',
            );
          }

          function renderProblemPage(title, lead, message, statusCode = 400) {
            return renderPage(
              title,
              lead,
              `<p class="muted">${escapeHtml(message)}</p><div class="actions"><a class="button secondary" href="${escapeHtml(appUrl('/setup/apps'))}">Back to Apps</a></div>`,
              statusCode,
            );
          }

          function isResourceNotFound(error) {
            const code = String(error?.name || error?.Code || error?.code || '').trim();
            return code === 'ResourceNotFoundException';
          }

          function isAlreadyExists(error) {
            const message = String(error?.message || error || '').toLowerCase();
            return message.includes('already exists') || message.includes('invalidinput');
          }

          function isPendingConfirmation(value) {
            return String(value || '').includes('PendingConfirmation');
          }

          function parseLicenseStatus(raw) {
            const parsed = JSON.parse(String(raw || '').trim());
            if (!parsed || typeof parsed !== 'object') {
              throw new Error('license status payload must be an object');
            }
            const status = String(parsed.status || '').trim().toLowerCase();
            if (!status) {
              throw new Error('license status is required');
            }
            return {
              status,
              message: String(parsed.message || '').trim(),
              errors: Array.isArray(parsed.errors) ? parsed.errors.map((value) => String(value || '').trim()).filter(Boolean) : [],
            };
          }

          async function loadStackConfig(aws) {
            const arn = String(process.env.RUNS_ON_STACK_CONFIG_SECRET_ARN || '').trim();
            if (!arn) {
              log('warn', 'Stack config secret ARN is not configured');
              return {};
            }

            const params = { SecretId: arn };
            const version = String(process.env.RUNS_ON_STACK_CONFIG_SECRET_VERSION || '').trim();
            if (version) {
              params.VersionId = version;
            }

            try {
              const output = await aws.getSecret(params);
              const raw = String(output?.SecretString || '').trim();
              if (!raw) {
                return {};
              }
              let parsed = null;
              try {
                parsed = JSON.parse(raw);
              } catch (_) {
                parsed = null;
              }
              return parsed && typeof parsed === 'object' ? parsed : {};
            } catch (error) {
              if (isResourceNotFound(error)) {
                log('warn', 'Stack config secret not found');
                return {};
              }
              throw error;
            }
          }

          async function loadStackReadyConfig(aws) {
            return readyConfigFromStackConfig(await loadStackConfig(aws));
          }

          function licenseKeyFromStackConfig(config) {
            return String(config?.LicenseKey || '').trim();
          }

          function createGitHubAppJwt(appConfig, now = () => Date.now()) {
            const appID = Number(appConfig?.id || appConfig?.app_id || 0);
            const pem = String(appConfig?.pem || appConfig?.PEM || '').trim();
            if (!appID || !pem) {
              throw new Error('converted GitHub App response is missing app ID or PEM');
            }

            const issuedAt = Math.floor(now() / 1000) - 60;
            const payload = {
              iat: issuedAt,
              exp: issuedAt + 10 * 60,
              iss: String(appID),
            };
            const encodedHeader = base64UrlEncode(JSON.stringify({ alg: 'RS256', typ: 'JWT' }));
            const encodedPayload = base64UrlEncode(JSON.stringify(payload));
            const signature = crypto
              .createSign('RSA-SHA256')
              .update(`${encodedHeader}.${encodedPayload}`)
              .sign(pem)
              .toString('base64url');
            return `${encodedHeader}.${encodedPayload}.${signature}`;
          }

          async function buildHealthIndicators(aws) {
            const indicators = [];

            const licenseIndicator = {
              name: 'License',
              description: 'RunsOn license validation status',
              status: 'warning',
              message: 'Verifying',
            };
            const licenseStatusParameter = String(process.env.RUNS_ON_LICENSE_STATUS_SSM_PARAMETER || '').trim();
            if (licenseStatusParameter) {
              try {
                const result = await aws.getParameter({ Name: licenseStatusParameter });
                const value = String(result?.Parameter?.Value || '').trim();
                if (value) {
                  const snapshot = parseLicenseStatus(value);
                  if (snapshot.status === 'valid') {
                    licenseIndicator.status = 'healthy';
                    licenseIndicator.message = snapshot.message || 'License valid';
                  } else if (snapshot.status === 'invalid') {
                    licenseIndicator.status = 'error';
                    licenseIndicator.message = snapshot.message || 'License invalid';
                    if (snapshot.errors.length > 0) {
                      licenseIndicator.hint = snapshot.errors.join('; ');
                    }
                    licenseIndicator.url = 'https://runs-on.com/pricing/';
                  } else {
                    licenseIndicator.status = 'warning';
                    licenseIndicator.message = snapshot.message || 'Verifying';
                  }
                }
              } catch (_) {
                licenseIndicator.status = 'warning';
                licenseIndicator.message = 'Verifying';
              }
            }
            indicators.push(licenseIndicator);

            const topicArn = String(process.env.RUNS_ON_TOPIC_ARN || '').trim();
            const emailIndicator = {
              name: 'Email notifications',
              description: 'SNS email subscription confirmation status',
              hint: 'Check your email inbox for a confirmation email from AWS',
              url: 'https://runs-on.com/monitoring/alerts/',
              status: 'warning',
              message: 'No email subscription found',
            };
            if (!topicArn) {
              emailIndicator.status = 'error';
              emailIndicator.message = 'SNS topic ARN is not configured';
            } else {
              try {
                const result = await aws.listSubscriptionsByTopic({ TopicArn: topicArn });
                let hasConfirmedEmail = false;
                let hasUnconfirmedEmail = false;
                for (const subscription of result?.Subscriptions || []) {
                  if (subscription?.Protocol === 'email') {
                    if (!isPendingConfirmation(subscription?.SubscriptionArn)) {
                      hasConfirmedEmail = true;
                    } else {
                      hasUnconfirmedEmail = true;
                    }
                  }
                }
                if (hasConfirmedEmail) {
                  emailIndicator.status = 'healthy';
                  emailIndicator.message = 'Email subscription confirmed and active';
                } else if (hasUnconfirmedEmail) {
                  emailIndicator.status = 'warning';
                  emailIndicator.message = 'Email subscription pending confirmation';
                }
              } catch (_) {
                emailIndicator.status = 'error';
                emailIndicator.message = 'Unable to check subscription status';
              }
            }
            indicators.push(emailIndicator);

            const spotIndicator = {
              name: 'EC2 Spot Instance Service Role',
              description: 'Required role for launching spot instances',
              status: 'healthy',
              message: 'AWSServiceRoleForEC2Spot role found and active',
            };
            try {
              await aws.getRole({ RoleName: 'AWSServiceRoleForEC2Spot' });
            } catch (error) {
              try {
                await aws.createServiceLinkedRole({ AWSServiceName: 'spot.amazonaws.com' });
                spotIndicator.message = 'AWSServiceRoleForEC2Spot role created and active';
              } catch (createError) {
                if (isAlreadyExists(createError)) {
                  spotIndicator.message = 'AWSServiceRoleForEC2Spot role found and active';
                } else {
                  spotIndicator.status = 'error';
                  spotIndicator.message = 'Failed to create AWSServiceRoleForEC2Spot role';
                }
              }
            }
            indicators.push(spotIndicator);

            return indicators;
          }

          function createHandler(options = {}) {
            const aws = options.aws || createDefaultAws();
            const fetchImpl = options.fetchImpl || fetch;
            const uuid = options.uuid || (() => crypto.randomUUID());
            const now = options.now || (() => Date.now());
            const createAppJwt = options.createAppJwt || ((appConfig) => createGitHubAppJwt(appConfig, now));

            async function loadState() {
              const arn = String(process.env.RUNS_ON_GITHUB_APPS_SECRET_ARN || '').trim();
              if (!arn) {
                log('warn', 'GitHub apps setup secret ARN is not configured');
                return stateForPersisted(null);
              }

              try {
                const output = await aws.getSecret({ SecretId: arn });
                const raw = String(output?.SecretString || '').trim();
                if (!raw) {
                  return stateForPersisted(null);
                }
                let parsed = null;
                try {
                  parsed = JSON.parse(raw);
                } catch (_) {
                  parsed = null;
                }
                const state = stateForPersisted(parsed);
                log('info', 'Loaded GitHub apps setup state', {
                  has_primary_app: state.hasPrimaryApp,
                  app_id: state.appId,
                });
                return state;
              } catch (error) {
                if (isResourceNotFound(error)) {
                  log('warn', 'GitHub apps setup secret not found');
                  return stateForPersisted(null);
                }
                throw error;
              }
            }

            async function readyz() {
              const [state, readyConfig] = await Promise.all([
                loadState(),
                loadStackReadyConfig(aws),
              ]);
              const appTag = String(process.env.RUNS_ON_APP_TAG || '').trim();
              const githubAppConfigured = state.hasPrimaryApp;
              return jsonResponse(githubAppConfigured ? 200 : 503, {
                app_tag: appTag,
                app_version: appTag,
                github_app_configured: githubAppConfigured,
                ready_config: readyConfig,
              });
            }

            async function putPersistedGitHubApps(persisted, secretVersionId) {
              return aws.putSecret({
                SecretId: process.env.RUNS_ON_GITHUB_APPS_SECRET_ARN,
                SecretString: JSON.stringify(persisted),
                ClientRequestToken: secretVersionId,
              });
            }

            async function enqueueGitHubAppsChanged(appKey, reason, secretVersionId) {
              const normalizedAppKey = String(appKey || '').trim();
              const normalizedReason = String(reason || '').trim();
              log('info', 'Queueing GitHub app lifecycle event', {
                queue_type: 'system',
                queue_event: 'github_apps_changed',
                app_key: normalizedAppKey,
                reason: normalizedReason,
              });
              return aws.sendQueueMessage({
                QueueUrl: process.env.RUNS_ON_SYSTEM_QUEUE_URL,
                MessageBody: JSON.stringify({
                  event: 'github_apps_changed',
                  app_key: normalizedAppKey,
                  reason: normalizedReason,
                }),
                MessageDeduplicationId: secretVersionId,
                MessageGroupId: 'app-lifecycle',
              });
            }

            async function convertManifest(code) {
              const response = await fetchImpl(githubApiUrl() + 'app-manifests/' + encodeURIComponent(code) + '/conversions', {
                method: 'POST',
                headers: {
                  Accept: 'application/vnd.github+json',
                  'User-Agent': 'runs-on-setup',
                },
              });
              if (!response.ok) {
                log('error', 'GitHub App manifest conversion failed', {
                  status: response.status,
                });
                return { error: jsonResponse(500, { error: 'app manifest conversion failed', status: response.status }) };
              }
              return { appConfig: await response.json() };
            }

            async function verifyConvertedAppOwner(appConfig) {
              let jwt;
              try {
                jwt = createAppJwt(appConfig);
              } catch (error) {
                log('warn', 'Rejecting converted GitHub App without usable app credentials', {
                  error: String(error?.message || error),
                });
                return { ok: false, message: 'GitHub did not return usable app credentials for ownership validation.' };
              }

              const response = await fetchImpl(githubApiUrl() + 'app', {
                method: 'GET',
                headers: {
                  Accept: 'application/vnd.github+json',
                  Authorization: `Bearer ${jwt}`,
                  'User-Agent': 'runs-on-setup',
                },
              });
              if (!response.ok) {
                log('warn', 'GitHub App ownership validation failed', {
                  status: response.status,
                });
                return { ok: false, message: 'GitHub App ownership could not be validated.' };
              }

              const app = await response.json();
              const ownerLogin = String(app?.owner?.login || '').trim();
              if (!ownerLogin || !stringsEqualFold(ownerLogin, configuredGitHubOrg())) {
                log('warn', 'Rejecting GitHub App owned outside configured organization', {
                  configured_org: configuredGitHubOrg(),
                  owner_login: ownerLogin,
                });
                return { ok: false, message: 'The converted GitHub App is not owned by the configured RunsOn GitHub organization.' };
              }
              return { ok: true, ownerLogin };
            }

            function validateSetupCallbackState(request, kind, licenseKey, expected = {}) {
              const verification = verifySetupState(request.queryStringParameters?.state || '', kind, licenseKey, now, expected);
              if (verification.ok) return null;
              log('warn', 'Rejecting GitHub App setup callback with invalid state', {
                setup_kind: kind,
                reason: verification.message,
              });
              return renderProblemPage('GitHub App setup failed', 'The setup callback could not be validated.', verification.message, 400);
            }

            async function convertPrimary(request, currentState, licenseKey) {
              const code = request.queryStringParameters?.code || '';
              if (!code) {
                log('warn', 'Rejecting setup convert request without code');
                return jsonResponse(400, { error: 'missing code parameter' });
              }
              const stateError = validateSetupCallbackState(request, 'primary', licenseKey);
              if (stateError) return stateError;

              log('info', 'Processing primary GitHub App manifest conversion');
              const conversion = await convertManifest(code);
              if (conversion.error) return conversion.error;

              const appConfig = conversion.appConfig;
              const ownerValidation = await verifyConvertedAppOwner(appConfig);
              if (!ownerValidation.ok) {
                return renderProblemPage('GitHub App setup failed', 'The GitHub App owner could not be validated.', ownerValidation.message, 403);
              }

              const secretVersionId = uuid();
              const persisted = buildPendingPersistedGitHubApps(appConfig, currentState.persisted);
              await putPersistedGitHubApps(persisted, secretVersionId);
              await enqueueGitHubAppsChanged('primary', 'setup_convert', secretVersionId);
              const nextState = stateForPersisted(persisted);
              log('info', 'Stored primary GitHub App config and queued activation', {
                app_id: nextState.appId,
                installation_url: nextState.installationUrl,
              });
              return redirect(nextState.installationUrl || '/setup/success');
            }

            async function convertBoost(request, currentState, licenseKey) {
              const code = request.queryStringParameters?.code || '';
              if (!code) {
                log('warn', 'Rejecting boost convert request without code');
                return jsonResponse(400, { error: 'missing code parameter' });
              }
              const stateError = validateSetupCallbackState(request, 'boost', licenseKey, { primaryAppId: currentState.appId });
              if (stateError) return stateError;

              log('info', 'Processing GitHub boost app manifest conversion');
              const conversion = await convertManifest(code);
              if (conversion.error) return conversion.error;

              const appConfig = conversion.appConfig || {};
              const appKey = String(appConfig.slug || '').trim();
              if (!appKey) {
                return renderProblemPage('Boost app setup failed', 'GitHub did not return a stable app slug.', 'The GitHub manifest conversion response did not contain a slug, so the app could not be stored safely.', 500);
              }
              if (appKey === 'primary') {
                return renderProblemPage('Boost app setup failed', 'The generated GitHub app slug is reserved.', 'Choose a different app name and try again.', 409);
              }

              const persisted = clonePersisted(currentState.persisted);
              persisted.boosts = persisted.boosts && typeof persisted.boosts === 'object' ? persisted.boosts : {};
              if (persisted.boosts[appKey]) {
                return renderProblemPage('Boost app already exists', 'A boost app with this GitHub slug is already configured for the stack.', `The app key ${appKey} is already present in the shared GitHub apps secret.`, 409);
              }

              const ownerValidation = await verifyConvertedAppOwner(appConfig);
              if (!ownerValidation.ok) {
                return renderProblemPage('Boost app setup failed', 'The GitHub App owner could not be validated.', ownerValidation.message, 403);
              }

              persisted.boosts[appKey] = {
                app_config: boostAppConfigForPersistence(appConfig),
                github_app_label: appKey,
              };

              const secretVersionId = uuid();
              await putPersistedGitHubApps(persisted, secretVersionId);
              await enqueueGitHubAppsChanged(appKey, 'boost_setup_convert', secretVersionId);
              const installationUrl = appNewInstallationUrl(appConfig);
              log('info', 'Stored boost GitHub App config and queued reconcile', {
                app_key: appKey,
                app_id: Number(appConfig.id || 0),
                installation_url: installationUrl,
              });
              return redirect(installationUrl || '/setup/apps');
            }

            async function setupSuccess() {
              const state = await loadState();
              if (!state.hasPrimaryApp) return redirect('/setup');
              const indicators = await buildHealthIndicators(aws);
              log('info', 'Rendering setup success page', {
                has_primary_app: state.hasPrimaryApp,
                app_id: state.appId,
              });
              return renderSetupSuccessPage(state, indicators);
            }

            return async function handler(event) {
              const request = requestFor(event);
              const method = request.method;
              const path = request.path;
              const requestId = request.requestId;

              log('info', 'GitHub apps setup request received', {
                request_id: requestId,
                method,
                path,
              });

              try {
                let response;
                if (path === '/') {
                  response = method === 'GET' ? redirect('/setup') : methodNotAllowed(['GET']);
                } else if (path === '/readyz') {
                  response = method === 'GET' ? await readyz() : methodNotAllowed(['GET']);
                } else if (path === '/setup') {
                  if (method !== 'GET') {
                    response = methodNotAllowed(['GET']);
                  } else {
                    const state = await loadState();
                    if (state.hasPrimaryApp) {
                      response = redirect('/setup/apps');
                    } else {
                      const stackConfig = await loadStackConfig(aws);
                      response = renderSetupPage(licenseKeyFromStackConfig(stackConfig), uuid, now);
                    }
                  }
                } else if (path === '/setup/convert') {
                  if (method !== 'GET') {
                    response = methodNotAllowed(['GET']);
                  } else {
                    const state = await loadState();
                    if (state.hasPrimaryApp) {
                      response = redirect('/setup/apps');
                    } else {
                      const stackConfig = await loadStackConfig(aws);
                      response = await convertPrimary(request, state, licenseKeyFromStackConfig(stackConfig));
                    }
                  }
                } else if (path === '/setup/success') {
                  if (method !== 'GET') {
                    response = methodNotAllowed(['GET']);
                  } else {
                    response = await setupSuccess();
                  }
                } else if (path === '/setup/apps') {
                  if (method !== 'GET') {
                    response = methodNotAllowed(['GET']);
                  } else {
                    const state = await loadState();
                    if (!state.hasPrimaryApp) {
                      response = redirect('/setup');
                    } else {
                      const stackConfig = await loadStackConfig(aws);
                      response = renderAppsPage(state, uuid, licenseKeyFromStackConfig(stackConfig), now);
                    }
                  }
                } else if (path === '/setup/apps/convert') {
                  if (method !== 'GET') {
                    response = methodNotAllowed(['GET']);
                  } else {
                    const state = await loadState();
                    if (!state.hasPrimaryApp) {
                      response = redirect('/setup');
                    } else {
                      const stackConfig = await loadStackConfig(aws);
                      response = await convertBoost(request, state, licenseKeyFromStackConfig(stackConfig));
                    }
                  }
                } else {
                  response = jsonResponse(404, { error: 'not found' });
                }

                log('info', 'GitHub apps setup request completed', {
                  request_id: requestId,
                  method,
                  path,
                  status_code: response.statusCode,
                });
                return response;
              } catch (error) {
                log('error', 'GitHub apps setup request failed', {
                  request_id: requestId,
                  method,
                  path,
                  error: String(error?.message || error),
                });
                return jsonResponse(500, { error: 'internal server error' });
              }
            };
          }

          module.exports = {
            buildPendingPersistedGitHubApps,
            createHandler,
            handler: createHandler(),
            renderSetupSuccessPage,
          };
  RunsOnGitHubWafSyncFunction:
    Condition: WafEnabled
    Type: AWS::Lambda::Function
    Properties:
      Runtime: nodejs24.x
      Handler: index.handler
      Role: !GetAtt RunsOnGitHubWafSyncRole.Arn
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          RUNS_ON_GITHUB_META_URL: "https://api.github.com/meta"
          RUNS_ON_WAF_SCOPE: REGIONAL
          RUNS_ON_WAF_IPV4_IP_SET_ID: !GetAtt RunsOnPublicIngressAllowedIpsIPv4.Id
          RUNS_ON_WAF_IPV4_IP_SET_NAME: !Sub "${AWS::StackName}-allowed-ips-ipv4"
          RUNS_ON_WAF_IPV6_IP_SET_ID: !GetAtt RunsOnPublicIngressAllowedIpsIPv6.Id
          RUNS_ON_WAF_IPV6_IP_SET_NAME: !Sub "${AWS::StackName}-allowed-ips-ipv6"
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName
      Code:
        ZipFile: |
          'use strict';

          function createDefaultAws() {
            let initialized = false;
            let wafv2;
            let GetIPSetCommand;
            let UpdateIPSetCommand;

            function init() {
              if (initialized) return;
              initialized = true;
              const wafSdk = require('@aws-sdk/client-wafv2');
              wafv2 = new wafSdk.WAFV2Client({});
              GetIPSetCommand = wafSdk.GetIPSetCommand;
              UpdateIPSetCommand = wafSdk.UpdateIPSetCommand;
            }

            return {
              async getIPSet(params) {
                init();
                return wafv2.send(new GetIPSetCommand(params));
              },
              async updateIPSet(params) {
                init();
                return wafv2.send(new UpdateIPSetCommand(params));
              },
            };
          }

          function log(level, message, fields = {}) {
            const entry = {
              level,
              message,
              ...fields,
            };
            const rendered = JSON.stringify(entry);
            if (level === 'error') {
              console.error(rendered);
              return;
            }
            if (level === 'warn') {
              console.warn(rendered);
              return;
            }
            console.log(rendered);
          }

          function trimString(value) {
            return String(value || '').trim();
          }

          function uniqueSorted(addresses) {
            return Array.from(new Set((addresses || []).map((value) => trimString(value)).filter(Boolean))).sort();
          }

          function splitHookCidrs(meta) {
            const hooks = Array.isArray(meta?.hooks) ? meta.hooks : [];
            if (hooks.length === 0) {
              throw new Error('GitHub meta response did not include any webhook hook CIDRs');
            }

            const ipv4 = [];
            const ipv6 = [];
            for (const cidr of hooks) {
              const normalized = trimString(cidr);
              if (!normalized) continue;
              if (normalized.includes(':')) {
                ipv6.push(normalized);
              } else {
                ipv4.push(normalized);
              }
            }

            if (ipv4.length === 0 && ipv6.length === 0) {
              throw new Error('GitHub meta response did not include any valid webhook hook CIDRs');
            }

            return {
              ipv4: uniqueSorted(ipv4),
              ipv6: uniqueSorted(ipv6),
            };
          }

          function configFromEvent(event = {}, env = process.env) {
            const properties = event?.ResourceProperties || {};
            const input = event?.input && typeof event.input === 'object' ? event.input : {};

            return {
              metaUrl: trimString(properties.MetaUrl || input.meta_url || env.RUNS_ON_GITHUB_META_URL || 'https://api.github.com/meta'),
              scope: trimString(properties.Scope || input.scope || env.RUNS_ON_WAF_SCOPE || 'REGIONAL') || 'REGIONAL',
              ipv4Id: trimString(properties.IPv4IPSetId || input.ipv4_ip_set_id || env.RUNS_ON_WAF_IPV4_IP_SET_ID),
              ipv4Name: trimString(properties.IPv4IPSetName || input.ipv4_ip_set_name || env.RUNS_ON_WAF_IPV4_IP_SET_NAME),
              ipv6Id: trimString(properties.IPv6IPSetId || input.ipv6_ip_set_id || env.RUNS_ON_WAF_IPV6_IP_SET_ID),
              ipv6Name: trimString(properties.IPv6IPSetName || input.ipv6_ip_set_name || env.RUNS_ON_WAF_IPV6_IP_SET_NAME),
            };
          }

          async function fetchMeta(fetchImpl, metaUrl) {
            const response = await fetchImpl(metaUrl, {
              headers: {
                Accept: 'application/json',
                'User-Agent': 'runs-on-waf-sync',
              },
            });

            if (!response.ok) {
              throw new Error(`GitHub meta request failed with status ${response.status}`);
            }
            return response.json();
          }

          async function syncIPSet(aws, params, desiredAddresses) {
            const current = await aws.getIPSet({
              Id: params.id,
              Name: params.name,
              Scope: params.scope,
            });

            const nextAddresses = uniqueSorted(desiredAddresses);
            const existingAddresses = uniqueSorted(current?.IPSet?.Addresses || []);
            if (JSON.stringify(existingAddresses) === JSON.stringify(nextAddresses)) {
              return {
                updated: false,
                address_count: nextAddresses.length,
              };
            }

            await aws.updateIPSet({
              Id: params.id,
              Name: params.name,
              Scope: params.scope,
              Addresses: nextAddresses,
              LockToken: current?.LockToken,
            });

            return {
              updated: true,
              address_count: nextAddresses.length,
            };
          }

          async function performSync(event, options = {}) {
            const aws = options.aws || createDefaultAws();
            const fetchImpl = options.fetchImpl || fetch;
            const config = configFromEvent(event, options.env || process.env);

            if (!config.ipv4Id || !config.ipv4Name || !config.ipv6Id || !config.ipv6Name) {
              throw new Error('Both IPv4 and IPv6 WAF IP set identifiers must be configured');
            }

            const meta = await fetchMeta(fetchImpl, config.metaUrl);
            const hooks = splitHookCidrs(meta);

            const ipv4 = await syncIPSet(aws, {
              id: config.ipv4Id,
              name: config.ipv4Name,
              scope: config.scope,
            }, hooks.ipv4);

            const ipv6 = await syncIPSet(aws, {
              id: config.ipv6Id,
              name: config.ipv6Name,
              scope: config.scope,
            }, hooks.ipv6);

            const result = {
              meta_url: config.metaUrl,
              ipv4,
              ipv6,
            };
            log('info', 'Synchronized GitHub webhook CIDRs into WAF IP sets', result);
            return result;
          }

          async function sendCloudFormationResponse(event, status, data, reason) {
            const responseUrl = trimString(event?.ResponseURL);
            if (!responseUrl) return;

            const body = JSON.stringify({
              Status: status,
              Reason: reason || `See CloudWatch Logs for details: ${trimString(event?.LogicalResourceId) || 'RunsOnGitHubWafSyncSeed'}`,
              PhysicalResourceId: trimString(event?.PhysicalResourceId) || trimString(event?.LogicalResourceId) || 'RunsOnGitHubWafSyncSeed',
              StackId: trimString(event?.StackId),
              RequestId: trimString(event?.RequestId),
              LogicalResourceId: trimString(event?.LogicalResourceId),
              Data: data || {},
            });

            await fetch(responseUrl, {
              method: 'PUT',
              headers: {
                'content-type': '',
                'content-length': String(Buffer.byteLength(body)),
              },
              body,
            });
          }

          function isCloudFormationCustomResourceEvent(event) {
            return !!event?.ResponseURL && !!event?.RequestType;
          }

          async function createHandler(event, options = {}) {
            if (isCloudFormationCustomResourceEvent(event)) {
              if (event.RequestType === 'Delete') {
                await sendCloudFormationResponse(event, 'SUCCESS', { skipped: true }, 'Delete request acknowledged');
                return { skipped: true };
              }

              try {
                const result = await performSync(event, options);
                await sendCloudFormationResponse(event, 'SUCCESS', result);
                return result;
              } catch (error) {
                const message = String(error?.message || error);
                log('error', 'CloudFormation GitHub WAF seed failed', { error: message });
                await sendCloudFormationResponse(event, 'FAILED', { error: message }, message);
                throw error;
              }
            }

            return performSync(event, options);
          }

          module.exports = {
            configFromEvent,
            createHandler,
            handler: (event) => createHandler(event),
            splitHookCidrs,
            uniqueSorted,
          };
  RunsOnGitHubRunnerCacheRefreshFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: nodejs24.x
      Handler: index.handler
      Role: !GetAtt RunsOnGitHubRunnerCacheRefreshRole.Arn
      Timeout: 300
      MemorySize: 512
      Environment:
        Variables:
          RUNS_ON_RUNNER_CACHE_BUCKET: !Ref S3BucketCache
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName
      Code:
        ZipFile: |
          'use strict';

          const { createHash, randomUUID } = require('node:crypto');
          const fs = require('node:fs');
          const fsp = require('node:fs/promises');
          const os = require('node:os');
          const path = require('node:path');
          const { Readable } = require('node:stream');
          const { pipeline } = require('node:stream/promises');

          const defaultReleaseUrl = 'https://api.github.com/repos/actions/runner/releases/latest';
          const defaultPrefix = 'agents/github-runner';
          const defaultManifestKey = `${defaultPrefix}/latest.json`;
          const runnerVersionPattern = /^\d+\.\d+\.\d+$/;

          function createDefaultAws() {
            let initialized = false;
            let s3;
            let HeadObjectCommand;
            let GetObjectCommand;
            let PutObjectCommand;

            function init() {
              if (initialized) return;
              initialized = true;
              const s3Sdk = require('@aws-sdk/client-s3');
              s3 = new s3Sdk.S3Client({});
              HeadObjectCommand = s3Sdk.HeadObjectCommand;
              GetObjectCommand = s3Sdk.GetObjectCommand;
              PutObjectCommand = s3Sdk.PutObjectCommand;
            }

            return {
              async headObject(params) {
                init();
                return s3.send(new HeadObjectCommand(params));
              },
              async getObject(params) {
                init();
                return s3.send(new GetObjectCommand(params));
              },
              async putObject(params) {
                init();
                return s3.send(new PutObjectCommand(params));
              },
            };
          }

          function log(level, message, fields = {}) {
            const entry = { level, message, ...fields };
            const rendered = JSON.stringify(entry);
            if (level === 'error') {
              console.error(rendered);
              return;
            }
            if (level === 'warn') {
              console.warn(rendered);
              return;
            }
            console.log(rendered);
          }

          function trimString(value) {
            return String(value || '').trim();
          }

          function joinS3Key(...parts) {
            return parts
              .map((value) => trimString(value).replace(/^\/+|\/+$/g, ''))
              .filter(Boolean)
              .join('/');
          }

          function configFromEvent(event = {}, env = process.env) {
            const properties = event?.ResourceProperties || {};
            const input = event?.input && typeof event.input === 'object' ? event.input : {};
            const prefix = trimString(properties.Prefix || input.prefix || env.RUNS_ON_GITHUB_RUNNER_CACHE_PREFIX || defaultPrefix) || defaultPrefix;

            return {
              bucket: trimString(properties.Bucket || input.bucket || env.RUNS_ON_RUNNER_CACHE_BUCKET),
              prefix,
              manifestKey: trimString(properties.ManifestKey || input.manifest_key || env.RUNS_ON_GITHUB_RUNNER_MANIFEST_KEY || `${prefix}/latest.json`) || defaultManifestKey,
              releaseUrl: trimString(properties.ReleaseUrl || input.release_url || env.RUNS_ON_GITHUB_RUNNER_RELEASE_URL || defaultReleaseUrl) || defaultReleaseUrl,
            };
          }

          function runnerAssetSpecs(version) {
            return [
              { key: 'linux-x64', filename: `actions-runner-linux-x64-${version}.tar.gz`, contentType: 'application/gzip' },
              { key: 'linux-arm64', filename: `actions-runner-linux-arm64-${version}.tar.gz`, contentType: 'application/gzip' },
              { key: 'windows-x64', filename: `actions-runner-win-x64-${version}.zip`, contentType: 'application/zip' },
              { key: 'windows-arm64', filename: `actions-runner-win-arm64-${version}.zip`, contentType: 'application/zip' },
            ].map((asset) => ({
              ...asset,
              githubUrl: `https://github.com/actions/runner/releases/download/v${version}/${asset.filename}`,
            }));
          }

          async function fetchLatestVersion(fetchImpl, releaseUrl) {
            const response = await fetchImpl(releaseUrl, {
              headers: {
                Accept: 'application/json',
                'User-Agent': 'runs-on-github-runner-cache-refresh',
              },
            });
            if (!response.ok) {
              throw new Error(`GitHub latest runner release request failed with status ${response.status}`);
            }

            const payload = await response.json();
            const version = trimString(payload?.tag_name).replace(/^v/, '');
            if (!runnerVersionPattern.test(version)) {
              throw new Error(`GitHub latest runner release response did not include a valid tag_name: ${payload?.tag_name}`);
            }
            return version;
          }

          async function getObjectString(aws, bucket, key) {
            const result = await aws.getObject({ Bucket: bucket, Key: key });
            if (!result?.Body) {
              return '';
            }
            if (typeof result.Body.transformToString === 'function') {
              return result.Body.transformToString();
            }

            let body = '';
            for await (const chunk of result.Body) {
              body += Buffer.isBuffer(chunk) ? chunk.toString('utf8') : String(chunk);
            }
            return body;
          }

          async function loadExistingManifest(aws, bucket, key) {
            try {
              const body = await getObjectString(aws, bucket, key);
              if (!trimString(body)) {
                return null;
              }
              return JSON.parse(body);
            } catch (error) {
              if (isNotFoundError(error)) {
                return null;
              }
              throw error;
            }
          }

          async function objectExists(aws, bucket, key) {
            try {
              await aws.headObject({ Bucket: bucket, Key: key });
              return true;
            } catch (error) {
              if (isNotFoundError(error)) {
                return false;
              }
              throw error;
            }
          }

          function isNotFoundError(error) {
            const name = trimString(error?.name);
            const code = trimString(error?.Code || error?.code);
            return name === 'NotFound' ||
              name === 'NoSuchKey' ||
              code === 'NotFound' ||
              code === 'NoSuchKey' ||
              error?.$metadata?.httpStatusCode === 404;
          }

          async function downloadToFile(fetchImpl, url, filePath) {
            const response = await fetchImpl(url, {
              headers: {
                Accept: 'application/octet-stream',
                'User-Agent': 'runs-on-github-runner-cache-refresh',
              },
              redirect: 'follow',
            });
            if (!response.ok) {
              throw new Error(`GitHub runner asset request failed with status ${response.status} for ${url}`);
            }
            if (!response.body) {
              throw new Error(`GitHub runner asset response did not include a body for ${url}`);
            }

            await pipeline(Readable.fromWeb(response.body), fs.createWriteStream(filePath));
          }

          async function sha256ForFile(filePath) {
            const hash = createHash('sha256');
            const stream = fs.createReadStream(filePath);
            for await (const chunk of stream) {
              hash.update(chunk);
            }
            return hash.digest('hex');
          }

          function manifestAssetChanged(existing, expectedUrl) {
            return trimString(existing?.url) !== expectedUrl ||
              trimString(existing?.sha256) === '';
          }

          async function mirrorRunnerAsset(aws, fetchImpl, config, version, spec, existingManifest) {
            const objectKey = joinS3Key(config.prefix, version, spec.filename);
            const s3Url = `s3://${config.bucket}/${objectKey}`;
            const existingAsset = existingManifest?.assets?.[spec.key];
            if (
              trimString(existingManifest?.version) === version &&
              !manifestAssetChanged(existingAsset, s3Url) &&
              await objectExists(aws, config.bucket, objectKey)
            ) {
              return {
                reused: true,
                asset: {
                  url: s3Url,
                  sha256: trimString(existingAsset.sha256),
                },
              };
            }

            const tempPath = path.join(os.tmpdir(), `${randomUUID()}-${spec.filename}`);
            try {
              await downloadToFile(fetchImpl, spec.githubUrl, tempPath);
              const sha256 = await sha256ForFile(tempPath);
              await aws.putObject({
                Bucket: config.bucket,
                Key: objectKey,
                Body: fs.createReadStream(tempPath),
                ContentType: spec.contentType,
              });

              return {
                reused: false,
                asset: {
                  url: s3Url,
                  sha256,
                },
              };
            } finally {
              await fsp.rm(tempPath, { force: true });
            }
          }

          function manifestsEqual(left, right) {
            return JSON.stringify(left || null) === JSON.stringify(right || null);
          }

          async function performSync(event, options = {}) {
            const aws = options.aws || createDefaultAws();
            const fetchImpl = options.fetchImpl || fetch;
            const config = configFromEvent(event, options.env || process.env);
            if (!config.bucket) {
              throw new Error('RUNS_ON_RUNNER_CACHE_BUCKET must be configured');
            }

            const version = await fetchLatestVersion(fetchImpl, config.releaseUrl);
            const existingManifest = await loadExistingManifest(aws, config.bucket, config.manifestKey);
            const specs = runnerAssetSpecs(version);

            let reused = 0;
            let uploaded = 0;
            const assets = {};
            for (const spec of specs) {
              const mirrored = await mirrorRunnerAsset(aws, fetchImpl, config, version, spec, existingManifest);
              assets[spec.key] = mirrored.asset;
              if (mirrored.reused) {
                reused += 1;
              } else {
                uploaded += 1;
              }
            }

            const manifest = { version, assets };
            const changed = uploaded > 0 || !manifestsEqual(existingManifest, manifest);
            if (changed) {
              await aws.putObject({
                Bucket: config.bucket,
                Key: config.manifestKey,
                Body: JSON.stringify(manifest, null, 2),
                ContentType: 'application/json',
              });
            }

            const result = {
              bucket: config.bucket,
              manifest_key: config.manifestKey,
              version,
              asset_count: specs.length,
              reused,
              uploaded,
              changed,
            };
            log('info', 'Synchronized GitHub runner mirror into S3 cache', result);
            return result;
          }

          async function sendCloudFormationResponse(event, status, data, reason, fetchImpl = fetch) {
            const responseUrl = trimString(event?.ResponseURL);
            if (!responseUrl) return;

            const body = JSON.stringify({
              Status: status,
              Reason: reason || `See CloudWatch Logs for details: ${trimString(event?.LogicalResourceId) || 'RunsOnGitHubRunnerCacheRefreshSeed'}`,
              PhysicalResourceId: trimString(event?.PhysicalResourceId) || trimString(event?.LogicalResourceId) || 'RunsOnGitHubRunnerCacheRefreshSeed',
              StackId: trimString(event?.StackId),
              RequestId: trimString(event?.RequestId),
              LogicalResourceId: trimString(event?.LogicalResourceId),
              Data: data || {},
            });

            await fetchImpl(responseUrl, {
              method: 'PUT',
              headers: {
                'content-type': '',
                'content-length': String(Buffer.byteLength(body)),
              },
              body,
            });
          }

          function isCloudFormationCustomResourceEvent(event) {
            return !!event?.ResponseURL && !!event?.RequestType;
          }

          async function createHandler(event, options = {}) {
            if (isCloudFormationCustomResourceEvent(event)) {
              if (event.RequestType === 'Delete') {
                await sendCloudFormationResponse(event, 'SUCCESS', { skipped: true }, 'Delete request acknowledged', options.fetchImpl || fetch);
                return { skipped: true };
              }

              try {
                const result = await performSync(event, options);
                await sendCloudFormationResponse(event, 'SUCCESS', result, undefined, options.fetchImpl || fetch);
                return result;
              } catch (error) {
                const message = String(error?.message || error);
                log('error', 'CloudFormation GitHub runner cache refresh seed failed', { error: message });
                await sendCloudFormationResponse(event, 'FAILED', { error: message }, message, options.fetchImpl || fetch);
                throw error;
              }
            }

            try {
              return await performSync(event, options);
            } catch (error) {
              const message = String(error?.message || error);
              log('error', 'GitHub runner cache refresh failed', { error: message });
              throw error;
            }
          }

          module.exports = {
            configFromEvent,
            createHandler,
            fetchLatestVersion,
            handler: (event) => createHandler(event),
            runnerAssetSpecs,
            sendCloudFormationResponse,
          };
  RunsOnGitHubWafSyncRule:
    Condition: WafEnabled
    Type: AWS::Events::Rule
    Properties:
      Description: Refreshes the public ingress WAF webhook IP allowlist every hour.
      ScheduleExpression: rate(1 hour)
      State: ENABLED
      Targets:
        - Arn: !GetAtt RunsOnGitHubWafSyncFunction.Arn
          Id: github-waf-sync

  RunsOnGitHubWafSyncInvokePermission:
    Condition: WafEnabled
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref RunsOnGitHubWafSyncFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt RunsOnGitHubWafSyncRule.Arn

  RunsOnGitHubWafSyncSeed:
    Condition: WafEnabled
    Type: Custom::RunsOnGitHubWafSyncSeed
    Properties:
      ServiceToken: !GetAtt RunsOnGitHubWafSyncFunction.Arn
      MetaUrl: "https://api.github.com/meta"
      Scope: REGIONAL
      IPv4IPSetId: !GetAtt RunsOnPublicIngressAllowedIpsIPv4.Id
      IPv4IPSetName: !Sub "${AWS::StackName}-allowed-ips-ipv4"
      IPv6IPSetId: !GetAtt RunsOnPublicIngressAllowedIpsIPv6.Id
      IPv6IPSetName: !Sub "${AWS::StackName}-allowed-ips-ipv6"

  RunsOnPublicIngressWebAcl:
    Condition: WafEnabled
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: !Sub "${AWS::StackName}-waf"
      Scope: REGIONAL
      Description: WAF for RunsOn public ingress - restricts the webhook endpoint to GitHub webhook IP ranges.
      DefaultAction:
        Block: {}
      Rules:
        - Name: AllowNonWebhookPaths
          Priority: 1
          Action:
            Allow: {}
          Statement:
            NotStatement:
              Statement:
                ByteMatchStatement:
                  PositionalConstraint: ENDS_WITH
                  SearchString: "/github/webhooks"
                  FieldToMatch:
                    UriPath: {}
                  TextTransformations:
                    - Priority: 0
                      Type: NONE
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: !Sub "${AWS::StackName}-allow-non-webhook-paths"
            SampledRequestsEnabled: true
        - Name: AllowWebhookIPv4
          Priority: 2
          Action:
            Allow: {}
          Statement:
            AndStatement:
              Statements:
                - ByteMatchStatement:
                    PositionalConstraint: ENDS_WITH
                    SearchString: "/github/webhooks"
                    FieldToMatch:
                      UriPath: {}
                    TextTransformations:
                      - Priority: 0
                        Type: NONE
                - IPSetReferenceStatement:
                    Arn: !GetAtt RunsOnPublicIngressAllowedIpsIPv4.Arn
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: !Sub "${AWS::StackName}-allow-webhook-ipv4"
            SampledRequestsEnabled: true
        - Name: AllowWebhookIPv6
          Priority: 3
          Action:
            Allow: {}
          Statement:
            AndStatement:
              Statements:
                - ByteMatchStatement:
                    PositionalConstraint: ENDS_WITH
                    SearchString: "/github/webhooks"
                    FieldToMatch:
                      UriPath: {}
                    TextTransformations:
                      - Priority: 0
                        Type: NONE
                - IPSetReferenceStatement:
                    Arn: !GetAtt RunsOnPublicIngressAllowedIpsIPv6.Arn
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: !Sub "${AWS::StackName}-allow-webhook-ipv6"
            SampledRequestsEnabled: true
      VisibilityConfig:
        CloudWatchMetricsEnabled: true
        MetricName: !Sub "${AWS::StackName}-waf"
        SampledRequestsEnabled: true
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName

  RunsOnPublicIngressRestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub "${AWS::StackName}-public-ingress"
      EndpointConfiguration:
        Types:
          - REGIONAL
      Tags:
        - Key: !Ref CostAllocationTag
          Value: !Ref AWS::StackName
        - Key: runs-on-stack-name
          Value: !Ref AWS::StackName

  RunsOnPublicIngressRestApiSetupResource:
    Condition: AdminRoutesEnabled
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RunsOnPublicIngressRestApi
      ParentId: !GetAtt RunsOnPublicIngressRestApi.RootResourceId
      PathPart: "setup"

  RunsOnPublicIngressRestApiSetupProxyResource:
    Condition: AdminRoutesEnabled
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RunsOnPublicIngressRestApi
      ParentId: !Ref RunsOnPublicIngressRestApiSetupResource
      PathPart: "{proxy+}"

  RunsOnPublicIngressRestApiGitHubResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RunsOnPublicIngressRestApi
      ParentId: !GetAtt RunsOnPublicIngressRestApi.RootResourceId
      PathPart: "github"

  RunsOnPublicIngressRestApiGitHubWebhooksResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RunsOnPublicIngressRestApi
      ParentId: !Ref RunsOnPublicIngressRestApiGitHubResource
      PathPart: "webhooks"

